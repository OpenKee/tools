<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idea Spark — What to Do?</title>
    <meta name="description" content="Random activity ideas powered by Bored API." />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar idea-topbar">
      <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
      <div class="topbar-right">
        <button id="langBtn" class="ok-lang-toggle" type="button">中文</button>
      </div>
    </nav>

    <main class="shell">
      <header class="masthead">
        <p class="eyebrow" data-ok-i18n="eyebrow">Bored API · Activity Ideas</p>
        <h1 data-ok-i18n="title">Idea Spark</h1>
        <p class="lead" data-ok-i18n="lead">Stuck on what to do? Get a random activity based on type and how many people are around.</p>
      </header>

      <section class="controls">
        <div class="setup-row">
          <label data-ok-i18n="type">Type</label>
          <select id="typeSelect" class="setup-select">
            <option value="" data-ok-i18n="any">Any</option>
            <option value="education">Education</option>
            <option value="recreational">Recreational</option>
            <option value="social">Social</option>
            <option value="diy">DIY</option>
            <option value="charity">Charity</option>
            <option value="cooking">Cooking</option>
            <option value="relaxation">Relaxation</option>
            <option value="music">Music</option>
            <option value="busywork">Busywork</option>
          </select>
        </div>
        <div class="setup-row">
          <label data-ok-i18n="participants">Participants</label>
          <select id="participantsSelect" class="setup-select">
            <option value="" data-ok-i18n="any">Any</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4+</option>
          </select>
        </div>
        <button id="sparkBtn" class="spark-btn" type="button" data-ok-i18n="spark">Spark an Idea</button>
      </section>

      <div id="loadingRow" class="ok-loading" style="display:none;">
        <span class="ok-spinner"></span>
        <span data-ok-i18n="loading">Loading…</span>
      </div>

      <div id="ideaCard" class="idea-card" style="display:none;">
        <div class="idea-emoji" id="ideaEmoji">💡</div>
        <h2 id="ideaActivity" class="idea-activity"></h2>
        <div class="idea-tags">
          <span id="ideaType" class="idea-tag"></span>
          <span id="ideaParticipants" class="idea-tag"></span>
          <span id="ideaPrice" class="idea-tag"></span>
          <span id="ideaDuration" class="idea-tag"></span>
        </div>
        <a id="ideaLink" class="idea-link" href="#" target="_blank" rel="noopener" data-ok-i18n="learnMore">Learn more ↗</a>
      </div>

      <div id="errorState" class="ok-error" style="display:none;" data-ok-i18n="fetchError">Failed to load activity.</div>
    </main>

    <footer class="ok-footer">
      <span data-ok-i18n="dataSource">Data: Bored API</span>
      <span><a href="https://openkee.github.io/" data-ok-i18n="allProjects">All projects ↗</a></span>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
