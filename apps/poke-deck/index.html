<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poké Deck — Pokémon Explorer</title>
    <meta name="description" content="Explore Pokémon stats, types, abilities and evolution via PokéAPI." />
    <meta name="theme-color" content="#ef4444" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar poke-topbar">
      <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
      <div class="topbar-right">
        <button id="langBtn" class="ok-lang-toggle" type="button">中文</button>
      </div>
    </nav>

    <main class="shell">
      <header class="masthead">
        <p class="eyebrow" data-ok-i18n="eyebrow">PokéAPI · Pokémon Explorer</p>
        <h1 data-ok-i18n="title">Poké Deck</h1>
        <p class="lead" data-ok-i18n="lead">Search any Pokémon by name or ID, view stats, types, abilities, and flavor text from the PokéAPI.</p>
      </header>

      <section class="controls">
        <form id="searchForm" class="search-row">
          <input id="searchInput" type="text" placeholder="Search Pokémon…" autocomplete="off" aria-label="Search Pokémon" />
          <button type="submit" data-ok-i18n="search">Search</button>
          <button id="randomBtn" type="button" class="ok-btn-ghost" data-ok-i18n="random">Random</button>
        </form>
        <div class="filter-row">
          <select id="typeSelect" class="filter-select">
            <option value="" data-ok-i18n="allTypes">All types</option>
          </select>
          <button id="prevBtn" type="button" class="ok-btn-ghost page-btn" data-ok-i18n="prev">← Prev</button>
          <button id="nextBtn" type="button" class="ok-btn-ghost page-btn" data-ok-i18n="next">Next →</button>
          <span id="pageInfo" class="page-info"></span>
        </div>
      </section>

      <div id="loadingRow" class="ok-loading">
        <span class="ok-spinner"></span>
        <span data-ok-i18n="loading">Loading…</span>
      </div>

      <div id="pokemonGrid" class="pokemon-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none;" data-ok-i18n="empty">No Pokémon found.</div>
    </main>

    <div id="detailModal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <footer class="ok-footer">
      <span data-ok-i18n="dataSource">Data: PokéAPI</span>
      <span><a href="https://openkee.github.io/" data-ok-i18n="allProjects">All projects ↗</a></span>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
