<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offday Planner — Holiday & Leave Optimizer</title>
<meta name="description" content="Plan holidays and optimize leave days. Browse public holidays by country and find the best bridge days." />
<meta property="og:title" content="Offday Planner" />
<meta property="og:description" content="Plan holidays and optimize leave days by country." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://openkee.github.io/offday-planner/" />
<meta name="twitter:card" content="summary" />
<meta name="theme-color" content="#f7f4ee" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="top-bar" style="padding:0.35rem 1.2rem;font-size:0.75rem;display:flex;align-items:center;border-bottom:1px solid rgba(128,128,128,0.1)"><a href="../../index.html" style="color:inherit;text-decoration:none;opacity:0.45;transition:opacity 0.15s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.45'">← OpenKee Tools</a></nav>
    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Holiday & leave optimizer</p>
          <h1 data-i18n="title">Offday Planner</h1>
          <p class="lead" data-i18n="lead">See holidays at a glance, find long weekends, and get the smartest days to take off.</p>
        </div>
        <div class="header-right">
          <form id="controlForm" class="control-form">
            <select id="countrySelect" aria-label="Country"></select>
            <select id="yearSelect" aria-label="Year"></select>
          </form>
          <button id="langToggle" class="lang-toggle" type="button">中文</button>
        </div>
      </header>

      <!-- Summary cards -->
      <section class="summary" id="summary"></section>

      <!-- Countdown -->
      <section class="countdown-card" id="countdownCard"></section>

      <!-- Year calendar grid -->
      <section class="year-grid" id="yearGrid"></section>

      <!-- Leave optimizer -->
      <section class="optimizer-section">
        <div class="section-head">
          <h2 data-i18n="optimizer">Leave optimizer</h2>
          <p class="section-desc" data-i18n="optimizerDesc">Take these days off to get the longest consecutive breaks.</p>
        </div>
        <div id="optimizerList" class="optimizer-grid"></div>
      </section>

      <!-- Holiday list -->
      <section class="holiday-section">
        <div class="section-head">
          <h2 data-i18n="allHolidays">All holidays</h2>
        </div>
        <div id="holidayList" class="holiday-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  
  <footer class="openkee-footer">
    Built by <a href="https://github.com/OpenKee" target="_blank" rel="noreferrer">OpenKee</a> &middot; <a href="https://openkee.github.io/" target="_blank" rel="noreferrer">All projects</a>
  </footer>

  </body>
</html>
