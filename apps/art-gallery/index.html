<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Art Gallery</title>
<meta name="theme-color" content="#f5f2eb"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Source+Sans+3:wght@300;400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f2eb;--sf:#fff;--ink:#1a1a1a;--mt:#6b5d4f;--dm:#9c8e7c;--rule:#d4c9b8;--blue:#1a3a5c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Source Sans 3","Noto Sans SC",sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
a{color:var(--ink);text-decoration:none}
.nav{padding:1rem 1.5rem;border-bottom:3px double var(--rule);display:flex;align-items:baseline;gap:.5rem;font-size:.85rem}
.nav b{font-weight:700}.nav .sep{color:var(--dm)}.nav .tag{font-size:.68rem;color:var(--dm);margin-left:auto;font-style:italic}
.header{text-align:center;padding:2.5rem 1.5rem 1.5rem;border-bottom:1px solid var(--rule)}
.header h1{font-family:"Playfair Display",serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:800}
.header .sub{color:var(--mt);font-size:.88rem;margin-top:.3rem;font-style:italic;font-family:"Playfair Display",serif}
.search{max-width:500px;margin:1.5rem auto;padding:0 1.5rem}
.search form{display:flex;border:1.5px solid var(--ink);overflow:hidden}
.search input{flex:1;height:2.8rem;padding:0 1rem;border:none;background:transparent;font:inherit;font-size:.88rem;color:var(--ink);outline:none}
.search input::placeholder{color:var(--dm);font-style:italic}
.search button{height:2.8rem;padding:0 1.5rem;background:var(--ink);color:var(--bg);border:none;font:inherit;font-weight:600;font-size:.78rem;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
.search button:disabled{opacity:.4}
.random{display:block;margin:.8rem auto 0;background:none;border:none;color:var(--blue);font:inherit;font-size:.82rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.loading{text-align:center;padding:2rem;color:var(--mt);font-style:italic;display:none}.loading.on{display:block}
.gallery{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
.art{cursor:pointer;transition:transform .3s}.art:hover{transform:translateY(-3px)}
.art .frame{aspect-ratio:3/4;background:var(--rule);border:8px solid #fff;box-shadow:2px 3px 12px rgba(0,0,0,.08);overflow:hidden}
.art .frame img{width:100%;height:100%;object-fit:cover;display:block}
.art .frame .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--dm)}
.art .label{padding:.6rem .2rem 0}
.art .label .title{font-family:"Playfair Display",serif;font-size:.92rem;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art .label .meta{font-size:.78rem;color:var(--mt);margin-top:.1rem}
.art .label .date{font-size:.72rem;color:var(--dm);font-style:italic}
.more{text-align:center;padding:1.5rem}
.more button{background:none;border:1px solid var(--ink);color:var(--ink);font:inherit;font-size:.82rem;padding:.5rem 1.5rem;cursor:pointer;transition:all .15s}
.more button:hover{background:var(--ink);color:var(--bg)}
.more button:disabled{opacity:.4}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;overflow-y:auto;padding:2rem}
.overlay.on{display:block}
.modal{max-width:900px;margin:0 auto;background:var(--bg);border:1px solid var(--rule);position:relative}
.modal .close{position:absolute;top:.5rem;right:.5rem;z-index:10;background:var(--bg);border:1px solid var(--rule);width:2rem;height:2rem;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal .top{display:flex;gap:2rem;padding:2rem;border-bottom:1px solid var(--rule)}
.modal .img-wrap{flex:1;max-width:500px}
.modal .img-wrap img{width:100%;display:block;border:4px solid #fff;box-shadow:2px 3px 12px rgba(0,0,0,.08)}
.modal .info{flex:1;min-width:0}
.modal .info h2{font-family:"Playfair Display",serif;font-size:1.4rem;font-weight:700;margin-bottom:.3rem}
.modal .info .artist{font-size:.95rem;color:var(--mt);margin-bottom:1rem}
.modal table{width:100%;border-collapse:collapse;font-size:.82rem}
.modal tr{border-bottom:1px solid #e8dfd2}
.modal td{padding:.4rem 0;vertical-align:top}
.modal td:first-child{color:var(--dm);width:5.5rem;font-size:.75rem;font-weight:500}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);gap:1rem}.modal .top{flex-direction:column}.modal .img-wrap{max-width:100%}}
</style>
</head>
<body>
<div class="nav"><b>openkee</b><span class="sep">/</span>tools<span class="sep">/</span>art-gallery<span class="tag">The Metropolitan Museum of Art</span></div>
<div class="header"><h1>🏛 Art Gallery</h1><div class="sub">Explore 400,000+ artworks from The Met</div></div>
<div class="search">
<form onsubmit="search();return false"><input type="text" id="inp" placeholder="Search… Monet, Van Gogh, Samurai…" autocomplete="off"/><button type="submit" id="btn">Search</button></form>
<button class="random" onclick="randomArt()">✦ <span class="en">Random artwork</span><span class="zh" style="display:none">随机浏览</span></button>
<button class="random" onclick="toggleLang()" style="font-size:.72rem"><span class="en">中文</span><span class="zh" style="display:none">EN</span></button>
</div>
<div class="loading" id="ld">Loading…</div>
<div class="gallery" id="out"></div>
<div class="more"><button id="moreBtn" onclick="loadMore()" style="display:none">Load more</button></div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()"><div class="modal" id="modal"></div></div>

<script>
var API='https://collectionapi.metmuseum.org/public/collection/v1';
var allIds=[];
var shown=0;
var batch=24;

function search(){
  var q=document.getElementById('inp').value.trim();if(!q)return;
  var btn=document.getElementById('btn');btn.disabled=true;
  document.getElementById('out').innerHTML='';
  document.getElementById('moreBtn').style.display='none';
  document.getElementById('ld').classList.add('on');
  shown=0;
  fetch(API+'/search?q='+encodeURIComponent(q)+'&hasImages=true')
    .then(function(r){return r.json()})
    .then(function(d){
      allIds=d.objectIDs||[];
      if(!allIds.length)throw Error('No results for "'+q+'"');
      return loadBatch();
    })
    .catch(function(e){
      document.getElementById('ld').classList.remove('on');
      document.getElementById('out').innerHTML='<div style="text-align:center;padding:2rem;color:var(--mt)">'+e.message+'</div>';
    })
    .finally(function(){btn.disabled=false});
}

function randomArt(){
  document.getElementById('out').innerHTML='';
  document.getElementById('moreBtn').style.display='none';
  document.getElementById('ld').classList.add('on');
  shown=0;
  // Random department
  var depts=[11,21,6,13,17,23,1,7,2,3,4,5,8,9,10,14,15,16,18,19,20,22];
  var dept=depts[Math.floor(Math.random()*depts.length)];
  fetch(API+'/objects?departmentIds='+dept+'&hasImages=true')
    .then(function(r){return r.json()})
    .then(function(d){
      allIds=d.objectIDs||[];
      // Shuffle
      for(var i=allIds.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=allIds[i];allIds[i]=allIds[j];allIds[j]=t;}
      return loadBatch();
    })
    .catch(function(){document.getElementById('ld').classList.remove('on')});
}

function loadBatch(){
  var ids=allIds.slice(shown,shown+batch);
  shown+=ids.length;
  return Promise.all(ids.map(function(id){
    return fetch(API+'/objects/'+id).then(function(r){return r.json()}).catch(function(){return null});
  })).then(function(arts){
    document.getElementById('ld').classList.remove('on');
    appendGrid(arts.filter(Boolean));
    document.getElementById('moreBtn').style.display=shown<allIds.length?'inline-block':'none';
  });
}

function loadMore(){
  var btn=document.getElementById('moreBtn');
  btn.textContent='Loading...';btn.disabled=true;
  loadBatch().then(function(){
    btn.textContent='Load more';btn.disabled=false;
  });
}

function appendGrid(arts){
  var grid=document.getElementById('out').querySelector('.grid');
  if(!grid){document.getElementById('out').innerHTML='<div class="grid"></div>';grid=document.getElementById('out').querySelector('.grid')}
  arts.forEach(function(a){
    var img=a.primaryImageSmall||'';
    var imgH=img?'<img src="'+img+'" alt="'+(a.title||'')+'" loading="lazy">':'<div class="no-img">🖼</div>';
    var div=document.createElement('div');
    div.className='art';
    div.innerHTML='<div class="frame">'+imgH+'</div><div class="label"><div class="title">'+(a.title||'Untitled')+'</div><div class="meta">'+(a.artistDisplayName||'Unknown')+'</div><div class="date">'+(a.objectDate||'')+'</div></div>';
    div.onclick=function(){showDetail(a.objectID)};
    grid.appendChild(div);
  });
}

function showDetail(id){
  fetch(API+'/objects/'+id)
    .then(function(r){return r.json()})
    .then(function(a){
      var img=a.primaryImage||a.primaryImageSmall||'';
      var t1=a.title||'Untitled';var imgH=img?'<img src="'+img+'" alt="'+t1+'">':'<div class="no-img">🖼</div>';
      var rows=[];
      if(a.objectDate)rows.push(['Date',a.objectDate]);
      if(a.medium)rows.push(['Medium',a.medium]);
      if(a.dimensions)rows.push(['Dimensions',a.dimensions]);
      if(a.department)rows.push(['Department',a.department]);
      if(a.period)rows.push(['Period',a.period]);
      if(a.culture)rows.push(['Culture',a.culture]);
      if(a.classification)rows.push(['Type',a.classification]);
      if(a.creditLine)rows.push(['Credit',a.creditLine]);
      var table=rows.map(function(r){return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>'}).join('');
      document.getElementById('modal').innerHTML='<button class="close" onclick="closeDetail()">✕</button><div class="top"><div class="img-wrap">'+imgH+'</div><div class="info"><h2>'+(a.title||'Untitled')+'</h2><div class="artist">'+(a.artistDisplayName||'Unknown artist')+'</div><table>'+table+'</table></div></div>';
      document.getElementById('overlay').classList.add('on');
    });
}

function closeDetail(){document.getElementById('overlay').classList.remove('on')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDetail()});

var isZh=false;
function toggleLang(){
  isZh=!isZh;
  document.querySelectorAll('.en').forEach(function(e){e.style.display=isZh?'none':'inline'});
  document.querySelectorAll('.zh').forEach(function(e){e.style.display=isZh?'inline':'none'});
  document.getElementById('inp').placeholder=isZh?'搜索… 莫奈、梵高、武士…':'Search... Monet, Van Gogh, Samurai...';
  document.querySelector('.search button').textContent=isZh?'搜索':'SEARCH';
  document.querySelector('.header .sub').textContent=isZh?'探索大都会博物馆 40 万+ 件藏品':'Explore 400,000+ artworks from The Met';
}
randomArt();
</script>
<div style="text-align:center;padding:1.5rem;border-top:1px solid #d4c9b8;margin-top:2rem;font-size:.72rem;color:#9c8e7c"><span>OpenKee · 2026</span> · <a href="https://github.com/OpenKee" target="_blank" style="color:#9c8e7c">GitHub</a> · <span class="en">Powered by The Met API</span><span class="zh" style="display:none">由大都会博物馆 API 驱动</span></div>
</body>
</html>
