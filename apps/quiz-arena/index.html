<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Arena — Trivia Challenge</title>
    <meta name="description" content="Trivia challenge powered by Open Trivia DB." />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar quiz-topbar">
      <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
      <div class="topbar-right">
        <button id="langBtn" class="ok-lang-toggle" type="button">中文</button>
      </div>
    </nav>

    <main class="shell">
      <header class="masthead">
        <p class="eyebrow" data-ok-i18n="eyebrow">Open Trivia DB · Trivia Challenge</p>
        <h1 data-ok-i18n="title">Quiz Arena</h1>
        <p class="lead" data-ok-i18n="lead">Pick a category and difficulty, then answer as many questions as you can.</p>
      </header>

      <section id="setupPanel" class="setup-panel">
        <div class="setup-row">
          <label data-ok-i18n="category">Category</label>
          <select id="categorySelect" class="setup-select"></select>
        </div>
        <div class="setup-row">
          <label data-ok-i18n="difficulty">Difficulty</label>
          <select id="difficultySelect" class="setup-select">
            <option value="" data-ok-i18n="anyDifficulty">Any</option>
            <option value="easy" data-ok-i18n="easy">Easy</option>
            <option value="medium" data-ok-i18n="medium">Medium</option>
            <option value="hard" data-ok-i18n="hard">Hard</option>
          </select>
        </div>
        <div class="setup-row">
          <label data-ok-i18n="amount">Questions</label>
          <select id="amountSelect" class="setup-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="20">20</option>
          </select>
        </div>
        <button id="startBtn" class="start-btn" type="button" data-ok-i18n="start">Start Quiz</button>
      </section>

      <div id="loadingRow" class="ok-loading" style="display:none;">
        <span class="ok-spinner"></span>
        <span data-ok-i18n="loading">Loading questions…</span>
      </div>

      <section id="gamePanel" class="game-panel" style="display:none;">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div class="question-header">
          <span id="questionCounter" class="question-counter"></span>
          <span id="questionMeta" class="question-meta"></span>
        </div>
        <div id="questionCard" class="question-card"></div>
        <div id="answersGrid" class="answers-grid"></div>
        <div id="feedbackRow" class="feedback-row" style="display:none;"></div>
        <button id="nextBtn" class="next-btn" type="button" style="display:none;" data-ok-i18n="next">Next →</button>
      </section>

      <section id="resultPanel" class="result-panel" style="display:none;">
        <div class="result-emoji">🏆</div>
        <h2 data-ok-i18n="resultTitle">Quiz Complete</h2>
        <p id="resultScore" class="result-score"></p>
        <p id="resultMessage" class="result-message"></p>
        <button id="restartBtn" class="start-btn" type="button" data-ok-i18n="playAgain">Play Again</button>
      </section>

      <div id="errorState" class="ok-error" style="display:none;" data-ok-i18n="fetchError">Failed to load questions.</div>
    </main>

    <footer class="ok-footer">
      <span data-ok-i18n="dataSource">Data: Open Trivia DB</span>
      <span><a href="https://openkee.github.io/" data-ok-i18n="allProjects">All projects ↗</a></span>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
