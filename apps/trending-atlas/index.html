<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trending Atlas — Discover What's Hot on GitHub</title>
<meta name="description" content="Discover trending GitHub repositories by day, week, or month. Filter by language and star count." />
<meta property="og:title" content="Trending Atlas" />
<meta property="og:description" content="Discover trending GitHub repositories by day, week, or month." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://openkee.github.io/trending-atlas/" />
<meta name="twitter:card" content="summary" />
<meta name="theme-color" content="#f2efe7" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar"><a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a></nav>
    <main class="shell">
      <header class="masthead">
        <div class="masthead-copy">
          <p class="kicker" data-ok-i18n="eyebrow">GitHub trending explorer</p>
          <h1 data-ok-i18n="title">Trending Atlas</h1>
          <p class="lead" data-ok-i18n="lead">Discover what the open-source world is building right now.</p>
        </div>
        <button id="langToggle" class="ok-lang-toggle" type="button">中文</button>
      </header>

      <section class="controls">
        <div class="range-tabs">
          <button class="range-btn active" data-range="daily" data-ok-i18n="daily">Today</button>
          <button class="range-btn" data-range="weekly" data-ok-i18n="weekly">This week</button>
          <button class="range-btn" data-range="monthly" data-ok-i18n="monthly">This month</button>
        </div>
        <div class="lang-filter">
          <select id="langSelect">
            <option value="" data-ok-i18n="allLanguages">All languages</option>
          </select>
        </div>
      </section>

      <section id="statusBar" class="status-bar"></section>

      <section id="repoGrid" class="repo-grid"></section>

      <section id="pagination" class="pagination"></section>
    </main>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>

  <footer class="ok-footer">
    Built by <a href="https://github.com/OpenKee" target="_blank" rel="noreferrer">OpenKee</a> &middot; <a href="https://openkee.github.io/" target="_blank" rel="noreferrer">All projects</a>
  </footer>
</body>
</html>
