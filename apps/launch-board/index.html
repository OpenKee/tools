<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Board — Rocket Launch Schedule</title>
  <meta name="description" content="Track upcoming rocket launches worldwide. Live countdowns, mission details, launch providers and launch sites. Powered by Launch Library 2." />
  <meta name="theme-color" content="#0c0c14" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶部栏：标题 + 语言切换 + 刷新 -->
  <header class="ok-topbar">
    <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
    <span class="topbar-title" data-ok-i18n="title">Launch Board</span>
    <div class="topbar-right">
      <button id="refreshBtn" class="ok-lang-toggle" type="button" data-ok-i18n="refresh" aria-label="Refresh">Refresh</button>
      <button id="langBtn" class="ok-lang-toggle" type="button">中</button>
    </div>
  </header>

  <main class="shell">
    <!-- 页头 -->
    <header class="masthead">
      <div>
        <p class="eyebrow" data-ok-i18n="eyebrow">Rocket launch schedule</p>
        <h1 data-ok-i18n="heroTitle">Launch Board</h1>
        <p class="lead" data-ok-i18n="lead">Live countdowns and mission details for upcoming orbital launches worldwide.</p>
      </div>
    </header>

    <!-- 下一次发射大卡片 -->
    <section id="heroCard" class="hero-card">
      <div class="ok-loading"><span class="ok-spinner"></span><span data-ok-i18n="loading">Loading next launch…</span></div>
    </section>

    <!-- 筛选区 -->
    <section class="filters">
      <div class="filter-group">
        <label class="filter-label" for="agencyFilter" data-ok-i18n="agency">Agency</label>
        <select id="agencyFilter" class="filter-select"></select>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="statusFilter" data-ok-i18n="status">Status</label>
        <select id="statusFilter" class="filter-select"></select>
      </div>
      <div class="filter-group filter-search">
        <label class="filter-label" for="searchInput" data-ok-i18n="search">Search</label>
        <input id="searchInput" type="search" class="filter-input" placeholder="Search mission or rocket…" />
      </div>
    </section>

    <!-- 即将发射列表 -->
    <section class="list-section">
      <div class="section-head">
        <h2 data-ok-i18n="upcoming">Upcoming Launches</h2>
        <span id="resultCount" class="result-count"></span>
      </div>
      <div id="launchGrid" class="launch-grid">
        <div class="ok-loading"><span class="ok-spinner"></span><span data-ok-i18n="loading">Loading…</span></div>
      </div>
    </section>
  </main>

  <!-- 详情弹窗 -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <footer class="ok-footer">
    Built by <a href="https://github.com/OpenKee" target="_blank" rel="noreferrer">OpenKee</a> &middot; <span data-ok-i18n="dataSource">Data: Launch Library 2</span> &middot; <a href="https://openkee.github.io/" target="_blank" rel="noreferrer" data-ok-i18n="allProjects">All projects</a>
  </footer>

  <script src="../../shared.js"></script>
  <script src="script.js"></script>
</body>
</html>
