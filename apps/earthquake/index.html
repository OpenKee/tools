<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Earthquake Monitor</title>
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌋</text></svg>"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--sf:#1e293b;--bd:rgba(255,255,255,.08);--tx:#e2e8f0;--mt:#94a3b8;--gn:#4ade80;--yl:#facc15;--or:#fb923c;--rd:#ef4444;--bl:#60a5fa}
body{font-family:Inter,system-ui,sans-serif;color:var(--tx);background:var(--bg);line-height:1.5}
.nav{padding:.8rem 1.25rem;display:flex;align-items:center;gap:.5rem;font-size:.8rem;background:var(--sf);border-bottom:1px solid var(--bd)}
.nav .live{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:blink 2s infinite}
@keyframes blink{50%{opacity:.3}}
.nav b{font-weight:600}.nav .sep{color:var(--mt)}.nav .r{margin-left:auto;font-size:.7rem;color:var(--mt)}
.filters{display:flex;gap:.3rem;padding:.6rem 1.25rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.fb{background:0;border:1px solid var(--bd);color:var(--mt);font:inherit;font-size:.7rem;padding:.25rem .6rem;border-radius:4px;cursor:pointer;transition:all .15s}
.fb:hover,.fb.on{border-color:var(--bl);color:var(--bl)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd)}
.st{background:var(--sf);padding:.5rem .8rem;text-align:center}
.st .v{font-size:1.1rem;font-weight:800}.st .l{font-size:.55rem;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
#map{height:50vh;min-height:300px}
.list{max-height:40vh;overflow-y:auto}
.list::-webkit-scrollbar{width:4px}.list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.it{display:flex;align-items:center;gap:.7rem;padding:.5rem 1.25rem;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.it:hover{background:var(--sf)}
.it .mg{width:2.5rem;height:2.5rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;flex-shrink:0}
.it .mg.g{background:rgba(74,222,128,.12);color:var(--gn)}
.it .mg.y{background:rgba(250,204,21,.12);color:var(--yl)}
.it .mg.o{background:rgba(251,146,60,.12);color:var(--or)}
.it .mg.r{background:rgba(239,68,68,.12);color:var(--rd)}
.it .inf{flex:1;min-width:0}
.it .pl{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.it .mt{font-size:.65rem;color:var(--mt)}
.it .ag{font-size:.65rem;color:var(--mt);flex-shrink:0}
.ld{text-align:center;padding:1.5rem;color:var(--mt);font-size:.82rem;display:none}.ld.on{display:block}
footer{padding:.5rem 1.25rem;background:var(--sf);border-top:1px solid var(--bd);font-size:.62rem;color:var(--mt);display:flex;justify-content:space-between}
.leaflet-container{background:#0f172a}
.leaflet-popup-content-wrapper{background:var(--sf)!important;color:var(--tx)!important;border-radius:8px!important}
.leaflet-popup-tip{background:var(--sf)!important}
@media(max-width:600px){#map{height:40vh;min-height:250px}.stats{grid-template-columns:repeat(2,1fr)}.it .ag{display:none}}
</style>
</head>
<body>
<div class="nav"><span class="live"></span><b>openkee</b><span class="sep">/</span>earthquake<span class="r" id="up"></span></div>
<div class="filters">
<button class="fb on" onclick="sp('day')">24h</button>
<button class="fb" onclick="sp('week')">7d</button>
<button class="fb" onclick="sp('month')">30d</button>
<button class="fb on" onclick="sm(0)" data-m="0">All</button>
<button class="fb" onclick="sm(2.5)" data-m="2.5">M2.5+</button>
<button class="fb" onclick="sm(4.5)" data-m="4.5">M4.5+</button>
<button class="fb" onclick="sm(5.5)" data-m="5.5">M5.5+</button>
</div>
<div class="stats" id="st"></div>
<div class="ld" id="ld">Loading...</div>
<div id="map"></div>
<div class="list" id="ls"></div>
<footer><span>USGS Earthquake Hazards Program</span><span id="ft"></span></footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var API="https://earthquake.usgs.gov/fdsnws/event/1/query";
var P="day",M=0,eqData=[],mk=[];
var m=L.map("map",{zoomControl:false,worldCopyJump:true}).setView([20,0],2);
L.control.zoom({position:"topright"}).addTo(m);
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18,attribution:""}).addTo(m);

/* base radius at zoom 2 — scales with zoom */

function sp(p){P=p;document.querySelectorAll(".fb:not([data-m])").forEach(function(b){b.classList.toggle("on",b.textContent.indexOf(p==="day"?"24":p==="week"?"7":"30")>=0)});ld_()}
function sm(v){M=v;document.querySelectorAll(".fb[data-m]").forEach(function(b){b.classList.toggle("on",parseFloat(b.dataset.m)===v)});ld_()}
function c_(v){return v<3?"g":v<5?"y":v<6?"o":"r"}
function ag_(t){var d=Math.round((Date.now()-t)/60000);if(d<60)return d+"m";if(d<1440)return Math.round(d/60)+"h";return Math.round(d/1440)+"d"}

function ld_(){
  document.getElementById("ld").classList.add("on");
  var e=new Date(),s=new Date();
  if(P==="day")s.setDate(s.getDate()-1);
  else if(P==="week")s.setDate(s.getDate()-7);
  else s.setMonth(s.getMonth()-1);
  var u=API+"?format=geojson&starttime="+s.toISOString().slice(0,10)+"&endtime="+e.toISOString().slice(0,10)+"&minmagnitude="+M+"&orderby=time";
  fetch(u).then(function(r){return r.json()}).then(function(d){
    document.getElementById("ld").classList.remove("on");
    eqData=d.features||[];
    rS(eqData);rM();rL(eqData);
    document.getElementById("up").textContent=new Date().toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("ft").textContent=eqData.length+" events";
  }).catch(function(e){document.getElementById("ld").textContent="Error: "+e.message})
}

function rS(q){
  var x=0,p=0,g=0;
  q.forEach(function(e){var v=e.properties.mag;if(v>x)x=v;p+=e.geometry.coordinates[2];if(v>=5)g++});
  var a=q.length?Math.round(p/q.length):0;
  document.getElementById("st").innerHTML="<div class=\"st\"><div class=\"v\">"+q.length+"</div><div class=\"l\">Events</div></div><div class=\"st\"><div class=\"v\">"+(x?x.toFixed(1):"-")+"</div><div class=\"l\">Max</div></div><div class=\"st\"><div class=\"v\">"+a+"km</div><div class=\"l\">Avg Depth</div></div><div class=\"st\"><div class=\"v\">"+g+"</div><div class=\"l\">M5+</div></div>";
}

/* render markers — radius from Gutenberg-Richter: log10(A)=1.02M-4, R=sqrt(A/pi) km */
function eqRadius(mag){var A=Math.pow(10,1.02*mag-4);return Math.sqrt(A/Math.PI)*1000}
function rM(){
  mk.forEach(function(v){m.removeLayer(v)});mk=[];
  eqData.forEach(function(e){
    var p=e.properties,c=e.geometry.coordinates,v=p.mag||1;
    var r=Math.max(5000,eqRadius(v));
    var co=v<3?"#4ade80":v<5?"#facc15":v<6?"#fb923c":"#ef4444";
    var k=L.circle([c[1],c[0]],{radius:r,fillColor:co,color:co,weight:1,opacity:.5,fillOpacity:.2}).addTo(m);
    k.bindPopup("<b>M"+(v?v.toFixed(1):"?")+"</b> "+(p.place||"")+"<br>Depth: "+Math.round(c[2])+"km<br>R: "+Math.round(eqRadius(v)/1000)+"km");
    mk.push(k);
  });
}

function rL(q){
  var s=q.slice().sort(function(a,b){return b.properties.time-a.properties.time});
  var h="";
  s.slice(0,50).forEach(function(e){
    var p=e.properties,v=p.mag||0,c=e.geometry.coordinates;
    h+="<div class=\"it\" onclick=\"fl("+c[1]+","+c[0]+")\"><div class=\"mg "+c_(v)+"\">"+(v?v.toFixed(1):"?")+"</div><div class=\"inf\"><div class=\"pl\">"+(p.place||"Unknown")+"</div><div class=\"mt\">"+Math.round(c[2])+"km deep</div></div><div class=\"ag\">"+ag_(p.time)+"</div></div>";
  });
  document.getElementById("ls").innerHTML=h;
}
function fl(a,o){m.flyTo([a,o],6,{duration:1.5})}
ld_();
</script>
</body>
</html>
