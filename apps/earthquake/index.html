<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="no-referrer" />
<title>Global Earthquake Monitor</title>
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌋</text></svg>"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400 ;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f172a;--sf:#1e293b;--sf-hover:#334155;--bd:rgba(255,255,255,0.08);--tx:#e2e8f0;--mt:#94a3b8;--gn:#4ade80;--yl:#facc15;--or:#fb923c;--rd:#ef4444;--bl:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--tx);background:var(--bg);line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.nav{padding:0.8rem 1.25rem;display:flex;align-items:center;gap:0.75rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:10}
.nav .live{width:10px;height:10px;border-radius:50%;background:var(--gn);box-shadow:0 0 10px var(--gn);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3;box-shadow:none}}
.nav b{font-weight:700;font-size:1.1rem;letter-spacing:-0.02em}
.nav .sep{color:var(--mt)}
.nav .r{margin-left:auto;font-size:0.8rem;color:var(--mt);display:flex;align-items:center;gap:0.5rem}
.app-body{display:flex;flex:1;overflow:hidden}
#map{flex:1;background:var(--bg);z-index:1}
.sidebar{width:380px;background:var(--bg);border-left:1px solid var(--bd);display:flex;flex-direction:column;z-index:5}
.filters-container{padding:1rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-y:auto}
.filter-group{display:flex;gap:0.4rem;margin-bottom:0.75rem;flex-wrap:wrap}
.filter-group:last-child{margin-bottom:0}
.filter-label{font-size:0.65rem;color:var(--mt);width:100%;display:block;margin-bottom:0.2rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.fb{background:rgba(255,255,255,0.03);border:1px solid var(--bd);color:var(--mt);font:inherit;font-size:0.75rem;font-weight:500;padding:0.3rem 0.75rem;border-radius:6px;cursor:pointer;transition:all 0.2s}
.fb:hover{background:rgba(255,255,255,0.08);color:var(--tx)}
.fb.on{background:var(--bl);border-color:var(--bl);color:#fff}
.fb.overlay-btn.on{background:#64748b;border-color:#64748b}
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bd);gap:1px;flex-shrink:0}
.st{background:var(--sf);padding:0.75rem 0.5rem;text-align:center}
.st .v{font-size:1.1rem;font-weight:800;color:var(--tx)}
.st .l{font-size:0.6rem;color:var(--mt);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.2rem}
.list-wrapper{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.list{flex:1;overflow-y:auto;padding-bottom:1rem}
.list::-webkit-scrollbar{width:6px}
.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
.it{display:flex;align-items:center;gap:1rem;padding:0.8rem 1rem;border-bottom:1px solid var(--bd);cursor:pointer;transition:background 0.15s}
.it:hover{background:var(--sf-hover)}
.it .mg{width:2.8rem;height:2.8rem;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;font-weight:800;flex-shrink:0}
.it .mg.g{background:rgba(74,222,128,0.15);color:var(--gn)}
.it .mg.y{background:rgba(250,204,21,0.15);color:var(--yl)}
.it .mg.o{background:rgba(251,146,60,0.15);color:var(--or)}
.it .mg.r{background:rgba(239,68,68,0.15);color:var(--rd);box-shadow:0 0 10px rgba(239,68,68,0.3)}
.it .inf{flex:1;min-width:0}
.it .pl{font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.2rem}
.it .mt{font-size:0.75rem;color:var(--mt);display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center}
.it .ag{font-size:0.75rem;color:var(--mt);flex-shrink:0;text-align:right}
.loader-overlay{position:absolute;inset:0;background:rgba(15,23,42,0.7);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity 0.2s}
.loader-overlay.active{opacity:1;pointer-events:all}
.spinner{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{padding:0.6rem 1rem;background:var(--sf);border-top:1px solid var(--bd);font-size:0.7rem;color:var(--mt);display:flex;justify-content:space-between;flex-shrink:0}
.leaflet-popup-content-wrapper{background:var(--sf)!important;color:var(--tx)!important;border-radius:8px!important;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5)!important}
.leaflet-popup-tip{background:var(--sf)!important}
.leaflet-popup-content{margin:12px!important;font-family:'Inter',sans-serif}
.popup-title{font-weight:800;font-size:1.1rem;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.popup-sub{font-size:0.8rem;color:var(--mt)}
@media(max-width:768px){.app-body{flex-direction:column}.sidebar{width:100%;height:50vh;border-left:none;border-top:1px solid var(--bd)}#map{height:50vh;flex:none}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="nav"><span class="live"></span><b>openkee</b><span class="sep">/</span>Earthquake<div class="r"><span id="update-time">Updating...</span></div></div>
<div class="app-body">
<div id="map"></div>
<div class="sidebar">
<div class="filters-container">
<div class="filter-group" id="time-filters"><span class="filter-label">Search Parameters</span>
<button class="fb on" data-period="day">Past 24 Hours</button>
<button class="fb" data-period="week">Past 7 Days</button>
<button class="fb" data-period="month">Past 30 Days</button>
</div>
<div class="filter-group" id="mag-filters">
<button class="fb on" data-mag="0">All</button>
<button class="fb" data-mag="2.5">M2.5+</button>
<button class="fb" data-mag="4.5">M4.5+</button>
<button class="fb" data-mag="5.5">M5.5+</button>
</div>
<div class="filter-group" id="impact-filters"><span class="filter-label">Data Filters</span>
<button class="fb on" data-impact="all">All Events</button>
<button class="fb" data-impact="alert">PAGER Alert</button>
<button class="fb" data-impact="tsunami">🌊 Tsunami</button>
</div>
<div class="filter-group" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bd)">
<span class="filter-label">Map Overlays</span>
<button class="fb overlay-btn" data-overlay="plates">🗺️ Plate Boundaries</button>
<button class="fb overlay-btn" data-overlay="pop">👥 Population Density</button>
</div>
</div>
<div class="stats" id="stats-container"></div>
<div class="list-wrapper">
<div class="loader-overlay" id="loader"><div class="spinner"></div></div>
<div class="list" id="earthquake-list"></div>
</div>
<footer><span>USGS Data API</span><span id="event-count">0 events</span></footer>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var API_URL="https://earthquake.usgs.gov/fdsnws/event/1/query";
var state={period:'day',minMag:0,impact:'all',data:[]};
var darkBL=L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:18,attribution:""});
var lightBL=L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:18,attribution:""});
var map=L.map("map",{zoomControl:false,worldCopyJump:true,preferCanvas:true,minZoom:2,maxZoom:15}).setView([20,0],2);
L.control.zoom({position:"topleft"}).addTo(map);
darkBL.addTo(map);
var lg=L.layerGroup().addTo(map);
var popHeat=null;
var popPts=[];
function loadPopHeat(){
  if(popHeat)return Promise.resolve();
  return fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_populated_places_simple.geojson')
  .then(function(r){return r.json()})
  .then(function(d){
    popPts=[];
    d.features.forEach(function(f){
      var c=f.geometry.coordinates;
      var p=f.properties.pop_max||f.properties.pop_min||1000;
      popPts.push([c[1],c[0],Math.sqrt(p)/300]);
    });
    var z=map.getZoom();
    var r=Math.max(15, z*8);
    popHeat=L.heatLayer(popPts,{radius:r,blur:Math.round(r*0.8),maxZoom:15,max:1,gradient:{0.1:'rgba(255,255,255,0.05)',0.3:'rgba(255,255,255,0.15)',0.5:'rgba(255,255,255,0.3)',0.7:'rgba(255,255,255,0.5)',1:'rgba(255,255,255,0.8)'}});
    map.on('zoomend',function(){
      if(!popHeat||!map.hasLayer(popHeat))return;
      var z2=map.getZoom();
      var r2=Math.max(15,z2*8);
      map.removeLayer(popHeat);
      popHeat=L.heatLayer(popPts,{radius:r2,blur:Math.round(r2*0.8),maxZoom:15,max:1,gradient:{0.1:'rgba(255,255,255,0.05)',0.3:'rgba(255,255,255,0.15)',0.5:'rgba(255,255,255,0.3)',0.7:'rgba(255,255,255,0.5)',1:'rgba(255,255,255,0.8)'}});
      popHeat.addTo(map);
    });
  });
};
var platesL=null;
document.querySelectorAll('.overlay-btn').forEach(function(btn){
btn.addEventListener('click',async function(e){
var b=e.currentTarget;b.classList.toggle('on');var t=b.dataset.overlay;
if(t==='pop'){if(b.classList.contains('on')){loadPopHeat().then(function(){if(popHeat)popHeat.addTo(map)})}else{if(popHeat&&map.hasLayer(popHeat))map.removeLayer(popHeat)}}
else if(t==='plates'){if(b.classList.contains('on')){if(!platesL){try{var r2=await fetch('https://raw.githubusercontent.com/fraxen/tectonicplates/master/GeoJSON/PB2002_boundaries.json');var d2=await r2.json();platesL=L.layerGroup();L.geoJSON(d2,{style:{color:'#ef4444',weight:1.5,opacity:0.7}}).eachLayer(function(l){platesL.addLayer(l)})}catch(e){}}if(platesL&&!map.hasLayer(platesL))platesL.addTo(map)}else{if(platesL&&map.hasLayer(platesL))map.removeLayer(platesL)}}
})});
function mc(m){return m==null?"g":m<3?"g":m<5?"y":m<6?"o":"r"}
function mcol(m){return m==null?"#4ade80":m<3?"#4ade80":m<5?"#facc15":m<6?"#fb923c":"#ef4444"}
function ta(t){var d=Math.max(0,Math.round((Date.now()-t)/60000));if(d<60)return d+"m ago";if(d<1440)return Math.round(d/60)+"h ago";return Math.round(d/1440)+"d ago"}
function esc(s){if(!s)return"Unknown";return s.replace(/[&<>'"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c]})}
function eqR(m){return Math.sqrt(Math.pow(10,1.02*m-4)/Math.PI)*1000}
function gfd(){return state.data.filter(function(e){if(state.impact==='alert')return!!e.properties.alert;if(state.impact==='tsunami')return e.properties.tsunami===1;return true})}
document.querySelectorAll('#time-filters .fb').forEach(function(b){b.addEventListener('click',function(e){document.querySelectorAll('#time-filters .fb').forEach(function(x){x.classList.remove('on')});e.currentTarget.classList.add('on');state.period=e.currentTarget.dataset.period;ld()})});
document.querySelectorAll('#mag-filters .fb').forEach(function(b){b.addEventListener('click',function(e){document.querySelectorAll('#mag-filters .fb').forEach(function(x){x.classList.remove('on')});e.currentTarget.classList.add('on');state.minMag=parseFloat(e.currentTarget.dataset.mag);ld()})});
document.querySelectorAll('#impact-filters .fb').forEach(function(b){b.addEventListener('click',function(e){document.querySelectorAll('#impact-filters .fb').forEach(function(x){x.classList.remove('on')});e.currentTarget.classList.add('on');state.impact=e.currentTarget.dataset.impact;us();rm();rl()})});
function ld(){document.getElementById("loader").classList.add("active");var e=new Date(),s=new Date();if(state.period==="day")s.setDate(s.getDate()-1);else if(state.period==="week")s.setDate(s.getDate()-7);else s.setMonth(s.getMonth()-1);fetch(API_URL+"?format=geojson&starttime="+s.toISOString()+"&endtime="+e.toISOString()+"&minmagnitude="+state.minMag+"&limit=20000&orderby=time").then(function(r){return r.json()}).then(function(d){document.getElementById("loader").classList.remove("active");state.data=d.features||[];us();rm();rl();document.getElementById("update-time").textContent=new Date().toLocaleTimeString("en",{hour12:false,hour:"2-digit",minute:"2-digit"})}).catch(function(e){document.getElementById("loader").classList.remove("active");document.getElementById("earthquake-list").innerHTML="<div style='padding:2rem;text-align:center;color:var(--rd)'>Error</div>"})}
function us(){var cd=gfd(),mx=-Infinity,dp=0,sg=0,vd=0;cd.forEach(function(e){var m=e.properties.mag,d=e.geometry.coordinates[2];if(m!=null&&m>mx)mx=m;if(m>=5)sg++;if(d!=null){dp+=d;vd++}});var av=vd?Math.round(dp/vd):0;document.getElementById("stats-container").innerHTML='<div class="st"><div class="v">'+cd.length+'</div><div class="l">Total</div></div><div class="st"><div class="v">'+(mx>-Infinity?mx.toFixed(1):'-')+'</div><div class="l">Max Mag</div></div><div class="st"><div class="v">'+av+' km</div><div class="l">Avg Depth</div></div><div class="st"><div class="v">'+sg+'</div><div class="l">M5+</div></div>';document.getElementById("event-count").textContent=cd.length+" events"}
function rm(){map.removeLayer(lg);lg.clearLayers();var cd=gfd();cd.forEach(function(eq){var p=eq.properties,c=eq.geometry.coordinates,m=p.mag||0,d=c[2]!=null?Math.round(c[2]):'?';var col=mcol(m),r=eqR(m),pl=esc(p.place);var ac={green:'#4ade80',yellow:'#facc15',orange:'#fb923c',red:'#ef4444'};var ah=p.alert?'<br><strong>Pop. Impact:</strong> <span style="text-transform:uppercase;font-weight:bold;color:'+ac[p.alert]+'">'+p.alert+'</span>':'';var fh=p.felt?'<br><strong>Felt:</strong> '+p.felt+' people':'';var th=p.tsunami?'<br><strong style="color:#3b82f6">🌊 Tsunami</strong>':'';var pop='<div class="popup-title" style="color:'+col+'">M '+m.toFixed(1)+'</div><div class="popup-sub"><strong>Location:</strong> '+pl+'<br><strong>Depth:</strong> '+d+' km<br><strong>Radius:</strong> '+(r/1000).toFixed(0)+' km<br><strong>Time:</strong> '+new Date(p.time).toLocaleString()+ah+fh+th+'</div>';[-360,0,360].forEach(function(off){var k=L.circle([c[1],c[0]+off],{radius:r,fillColor:col,color:col,weight:1,opacity:0.5,fillOpacity:0.2}).addTo(lg);k.bindPopup(pop)})});map.addLayer(lg)}
function rl(){var cd=gfd().slice(0,100),h="";cd.forEach(function(eq){var p=eq.properties,c=eq.geometry.coordinates,m=p.mag||0;var ac={green:'#4ade80',yellow:'#facc15',orange:'#fb923c',red:'#ef4444'};var ab=p.alert?'<span style="font-size:0.65rem;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid '+ac[p.alert]+';color:'+ac[p.alert]+'">'+p.alert.toUpperCase()+'</span>':'';var tb=p.tsunami?'<span style="font-size:0.85rem">🌊</span>':'';h+='<div class="it" onclick="fl('+c[1]+','+c[0]+','+m+')"><div class="mg '+mc(m)+'">'+(m?m.toFixed(1):'?')+'</div><div class="inf"><div class="pl">'+esc(p.place)+'</div><div class="mt"><span>Depth: '+Math.round(c[2])+' km</span>'+ab+tb+'</div></div><div class="ag">'+ta(p.time)+'</div></div>'});document.getElementById("earthquake-list").innerHTML=h}
window.fl=function(lat,lng,mag){map.flyTo([lat,lng],mag>=6?5:mag>=4?6:8,{duration:1.5})};
ld();
</script>
</body>
</html>
