<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="no-referrer" />
<title>Global Earthquake Monitor — Real-time Seismic Activity</title>
<meta name="description" content="Real-time global earthquake monitor. Interactive map, magnitude filters, plate boundaries overlay. Powered by USGS data." />
<meta property="og:title" content="Global Earthquake Monitor" />
<meta property="og:description" content="Real-time global earthquake map with magnitude filters and plate boundaries." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://openkee.github.io/earthquake/" />
<meta name="twitter:card" content="summary" />
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌋</text></svg>"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" onerror="this.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css'"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../../shared.css"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav class="ok-topbar"><a href="../../index.html" class="ok-topbar-link" style="font-size:0.75rem">← Tools</a><span class="live"></span><b>openkee</b><span class="sep">/</span>Earthquake<div class="r"><span id="update-time" data-ok-i18n="updating">Updating...</span><button id="langToggle" class="ok-lang-toggle" type="button" style="margin-left:0.6rem">中文</button></div></nav>
<div class="app-body">
<div id="map"></div>
<div class="sidebar">
<div class="filters-container">
<div class="filter-group" id="time-filters"><span class="filter-label" data-ok-i18n="params">Search Parameters</span>
<button class="fb on" data-period="day" data-ok-i18n="day">Past 24 Hours</button>
<button class="fb" data-period="week" data-ok-i18n="week">Past 7 Days</button>
<button class="fb" data-period="month" data-ok-i18n="month">Past 30 Days</button>
</div>
<div class="filter-group" id="mag-filters">
<button class="fb on" data-mag="0" data-ok-i18n="all">All</button>
<button class="fb" data-mag="2.5">M2.5+</button>
<button class="fb" data-mag="4.5">M4.5+</button>
<button class="fb" data-mag="5.5">M5.5+</button>
</div>
<div class="filter-group" style="margin-top:0.5rem">
<button class="fb overlay-btn" data-overlay="plates" data-ok-i18n="plates">🗺️ Plate Boundaries</button>
</div>
<div class="stats" id="stats-container"></div>
<div class="list-wrapper">
<div class="loader-overlay" id="loader"><div class="spinner"></div></div>
<div class="list" id="earthquake-list"></div>
</div>
<footer class="ok-footer"><span>USGS Data API</span><span id="event-count">0 events</span></footer>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onerror="var f=document.createElement('script');f.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';document.head.appendChild(f)"></script>
<script src="../../shared.js"></script>
<script src="script.js"></script>
</body>
</html>
