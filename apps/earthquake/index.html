<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Earthquake Monitor</title>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌋</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--sf:#111;--bd:rgba(255,255,255,.07);--tx:#eee;--mt:#777;--gn:#4ade80;--yl:#facc15;--or:#fb923c;--rd:#ef4444;--bl:#60a5fa}
body{font-family:"Inter","Noto Sans SC",system-ui,sans-serif;color:var(--tx);background:var(--bg);line-height:1.5}
a{color:var(--tx);text-decoration:none}

.nav{padding:1rem 1.5rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;font-size:.8rem}
.nav .live{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:blink 2s infinite}
@keyframes blink{50%{opacity:.3}}
.nav b{font-weight:600}.nav .sep{color:var(--mt)}.nav .right{margin-left:auto;font-size:.7rem;color:var(--mt)}

.hero{text-align:center;padding:2rem 1.5rem 1rem}
.hero h1{font-size:1.8rem;font-weight:800;letter-spacing:-.03em}
.hero .sub{color:var(--mt);font-size:.85rem;margin-top:.2rem}

.filters{display:flex;gap:.35rem;justify-content:center;padding:0 1.5rem 1.5rem;flex-wrap:wrap}
.fbtn{background:0;border:1px solid var(--bd);color:var(--mt);font:inherit;font-size:.72rem;padding:.3rem .65rem;border-radius:6px;cursor:pointer;transition:all .15s}
.fbtn:hover,.fbtn.on{border-color:var(--bl);color:var(--bl)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin:0 1.5rem 1.5rem}
.stat{background:var(--sf);padding:.7rem;text-align:center}
.stat .v{font-size:1.3rem;font-weight:800}
.stat .l{font-size:.6rem;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-top:.1rem}

/* Map container with dots */
.map{position:relative;margin:0 1.5rem 1.5rem;border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:var(--sf);padding:1rem}
.map .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:10% 20%}
.map .dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}
.map .dot.g{background:var(--gn);box-shadow:0 0 6px var(--gn)}
.map .dot.y{background:var(--yl);box-shadow:0 0 6px var(--yl)}
.map .dot.o{background:var(--or);box-shadow:0 0 8px var(--or)}
.map .dot.r{background:var(--rd);box-shadow:0 0 12px var(--rd)}
.map .eq-text{position:absolute;bottom:.5rem;left:.5rem;font-size:.6rem;color:var(--mt)}

.list{padding:0 1.5rem 1.5rem}
.list .label{font-size:.65rem;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.item{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--bd)}
.item:last-child{border-bottom:none}
.item .mag{width:2.8rem;height:2.8rem;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800;flex-shrink:0}
.item .mag.g{background:rgba(74,222,128,.1);color:var(--gn)}
.item .mag.y{background:rgba(250,204,21,.1);color:var(--yl)}
.item .mag.o{background:rgba(251,146,60,.1);color:var(--or)}
.item .mag.r{background:rgba(239,68,68,.1);color:var(--rd)}
.item .info{flex:1;min-width:0}
.item .place{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{font-size:.68rem;color:var(--mt)}
.item .ago{font-size:.68rem;color:var(--mt);flex-shrink:0}

.ld{text-align:center;padding:2rem;color:var(--mt);font-size:.85rem;display:none}
.ld.on{display:block}

footer{padding:1rem 1.5rem;border-top:1px solid var(--bd);font-size:.65rem;color:var(--mt);display:flex;justify-content:space-between}

@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.item .ago{display:none}}
</style>
</head>
<body>

<div class="nav"><span class="live"></span><b>openkee</b><span class="sep">/</span>tools<span class="sep">/</span>earthquake<span class="right" id="updated"></span></div>
<div class="hero"><h1>🌋 Earthquake Monitor</h1><div class="sub">Real-time global seismic activity</div></div>

<div class="filters" id="filters">
<button class="fbtn on" onclick="setP('day')">24h</button>
<button class="fbtn" onclick="setP('week')">7 days</button>
<button class="fbtn" onclick="setP('month')">30 days</button>
<button class="fbtn on" onclick="setM(0)" data-m="0">All</button>
<button class="fbtn" onclick="setM(2.5)" data-m="2.5">M2.5+</button>
<button class="fbtn" onclick="setM(4.5)" data-m="4.5">M4.5+</button>
<button class="fbtn" onclick="setM(5.5)" data-m="5.5">M5.5+</button>
</div>

<div class="stats" id="stats"></div>
<div class="ld" id="ld">Loading…</div>
<div class="map" id="map"><div class="grid-bg"></div></div>
<div class="list" id="list"></div>
<footer><span>USGS Earthquake Hazards Program</span><span id="foot"></span></footer>

<script>
var API='https://earthquake.usgs.gov/fdsnws/event/1/query';
var P='day',M=0;

function setP(p){P=p;document.querySelectorAll('#filters .fbtn:not([data-m])').forEach(function(b){b.classList.toggle('on',b.textContent.toLowerCase().indexOf(p==='day'?'24':p==='week'?'7':'30')>=0)});load()}
function setM(m){M=m;document.querySelectorAll('.fbtn[data-m]').forEach(function(b){b.classList.toggle('on',parseFloat(b.dataset.m)===m)});load()}

function mc(m){return m<3?'g':m<5?'y':m<6?'o':'r'}

function ago(t){
  var d=Math.round((Date.now()-t)/60000);
  if(d<60)return d+'m ago';
  if(d<1440)return Math.round(d/60)+'h ago';
  return Math.round(d/1440)+'d ago';
}

function load(){
  document.getElementById('ld').classList.add('on');
  var end=new Date();var start=new Date();
  if(P==='day')start.setDate(start.getDate()-1);
  else if(P==='week')start.setDate(start.getDate()-7);
  else start.setDate(start.getDate()-30);

  var url=API+'?format=geojson&starttime='+start.toISOString().slice(0,10)+'&endtime='+end.toISOString().slice(0,10)+'&minmagnitude='+M+'&orderby=time';

  fetch(url).then(function(r){return r.json()}).then(function(d){
    document.getElementById('ld').classList.remove('on');
    var q=d.features||[];
    renderStats(q);
    renderMap(q);
    renderList(q);
    document.getElementById('updated').textContent=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('foot').textContent=q.length+' events';
  }).catch(function(e){
    document.getElementById('ld').textContent='Error: '+e.message;
  });
}

function renderStats(q){
  var max=0,dep=0,sig=0;
  q.forEach(function(e){var m=e.properties.mag;if(m>max)max=m;dep+=e.geometry.coordinates[2];if(m>=5)sig++});
  var avg=q.length?Math.round(dep/q.length):0;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="v">'+q.length+'</div><div class="l">Events</div></div>'+
    '<div class="stat"><div class="v">'+(max?max.toFixed(1):'—')+'</div><div class="l">Max</div></div>'+
    '<div class="stat"><div class="v">'+avg+'km</div><div class="l">Avg Depth</div></div>'+
    '<div class="stat"><div class="v">'+sig+'</div><div class="l">M5+</div></div>';
}

function renderMap(q){
  var map=document.getElementById('map');
  // Remove old dots
  map.querySelectorAll('.dot').forEach(function(d){d.remove()});
  var w=map.offsetWidth-2;var h=map.offsetHeight-2;
  map.style.minHeight='180px';

  // Take top 80 biggest for map
  var top=q.slice().sort(function(a,b){return b.properties.mag-a.properties.mag}).slice(0,80);
  top.forEach(function(e){
    var lon=e.geometry.coordinates[0];var lat=e.geometry.coordinates[1];
    var m=e.properties.mag||1;
    var x=(lon+180)/360*w+1;var y=(90-lat)/180*h+1;
    var r=Math.max(3,m*1.8);
    var dot=document.createElement('div');
    dot.className='dot '+mc(m);
    dot.style.cssText='left:'+x+'px;top:'+y+'px;width:'+r+'px;height:'+r+'px';
    map.appendChild(dot);
  });

  var eq=document.querySelector('.eq-text');
  if(!eq){eq=document.createElement('div');eq.className='eq-text';map.appendChild(eq)}
  eq.textContent=q.length+' earthquakes plotted';
}

function renderList(q){
  var sorted=q.slice().sort(function(a,b){return b.properties.time-a.properties.time});
  var html='<div class="label">Recent</div>';
  sorted.slice(0,40).forEach(function(e){
    var p=e.properties;var m=p.mag||0;
    html+='<div class="item"><div class="mag '+mc(m)+'">'+(m?m.toFixed(1):'?')+'</div><div class="info"><div class="place">'+(p.place||'Unknown')+'</div><div class="meta">'+Math.round(e.geometry.coordinates[2])+'km deep</div></div><div class="ago">'+ago(p.time)+'</div></div>';
  });
  document.getElementById('list').innerHTML=html;
}

load();
</script>
</body>
</html>
