<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Earthquake Monitor</title>
<meta name="theme-color" content="#1a1a2e"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌋</text></svg>"/>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--sf:#16213e;--bd:rgba(255,255,255,.08);--tx:#e8e8e8;--mt:#7878a0;--gn:#4ade80;--yl:#facc15;--or:#fb923c;--rd:#ef4444;--bl:#60a5fa}
body{font-family:"Inter",system-ui,sans-serif;color:var(--tx);background:var(--bg);line-height:1.5}
.nav{padding:.8rem 1.25rem;display:flex;align-items:center;gap:.5rem;font-size:.8rem;background:var(--sf);border-bottom:1px solid var(--bd)}
.nav .live{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:blink 2s infinite}
@keyframes blink{50%{opacity:.3}}
.nav b{font-weight:600}.nav .sep{color:var(--mt)}.nav .r{margin-left:auto;font-size:.7rem;color:var(--mt)}
.filters{display:flex;gap:.3rem;padding:.6rem 1.25rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.fbtn{background:0;border:1px solid var(--bd);color:var(--mt);font:inherit;font-size:.7rem;padding:.25rem .6rem;border-radius:4px;cursor:pointer;transition:all .15s}
.fbtn:hover,.fbtn.on{border-color:var(--bl);color:var(--bl)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd)}
.stat{background:var(--sf);padding:.5rem .8rem;text-align:center}
.stat .v{font-size:1.1rem;font-weight:800}.stat .l{font-size:.55rem;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
#map{height:50vh;min-height:300px;background:var(--sf);position:relative}
.list{max-height:40vh;overflow-y:auto}
.list::-webkit-scrollbar{width:4px}.list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.item{display:flex;align-items:center;gap:.7rem;padding:.5rem 1.25rem;border-bottom:1px solid var(--bd);transition:background .15s;cursor:pointer}
.item:hover{background:var(--sf)}
.item .mag{width:2.5rem;height:2.5rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;flex-shrink:0}
.item .mag.g{background:rgba(74,222,128,.12);color:var(--gn)}
.item .mag.y{background:rgba(250,204,21,.12);color:var(--yl)}
.item .mag.o{background:rgba(251,146,60,.12);color:var(--or)}
.item .mag.r{background:rgba(239,68,68,.12);color:var(--rd)}
.item .info{flex:1;min-width:0}
.item .place{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{font-size:.65rem;color:var(--mt)}
.item .ago{font-size:.65rem;color:var(--mt);flex-shrink:0}
.ld{text-align:center;padding:1.5rem;color:var(--mt);font-size:.82rem;display:none}.ld.on{display:block}
footer{padding:.5rem 1.25rem;background:var(--sf);border-top:1px solid var(--bd);font-size:.62rem;color:var(--mt);display:flex;justify-content:space-between}
/* Token setup overlay */
.token-overlay{position:absolute;inset:0;background:rgba(26,26,46,.95);display:flex;align-items:center;justify-content:center;z-index:100}
.token-overlay.hidden{display:none}
.token-box{text-align:center;max-width:400px;padding:2rem}
.token-box h2{font-size:1.2rem;margin-bottom:.5rem}
.token-box p{color:var(--mt);font-size:.82rem;margin-bottom:1rem;line-height:1.6}
.token-box input{width:100%;height:2.5rem;padding:0 .8rem;background:var(--bg);border:1px solid var(--bd);color:var(--tx);font:inherit;font-size:.82rem;border-radius:6px;margin-bottom:.8rem;outline:none}
.token-box input:focus{border-color:var(--bl)}
.token-box button{height:2.5rem;padding:0 1.5rem;background:var(--bl);color:#fff;border:none;font:inherit;font-weight:600;font-size:.82rem;border-radius:6px;cursor:pointer}
.token-box .hint{font-size:.68rem;color:var(--dm);margin-top:.8rem}
.token-box .hint a{color:var(--bl)}
.mapboxgl-popup-content{background:var(--sf)!important;color:var(--tx)!important;border-radius:8px!important;padding:.8rem 1rem!important;font-family:Inter,sans-serif;font-size:.78rem;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.mapboxgl-popup-tip{border-top-color:var(--sf)!important}
.mapboxgl-popup-content b{color:var(--bl)}
.mapboxgl-popup-content .pw{margin-top:.2rem;font-size:.68rem;color:var(--mt)}
@media(max-width:600px){#map{height:40vh;min-height:250px}.stats{grid-template-columns:repeat(2,1fr)}.item .ago{display:none}}
</style>
</head>
<body>
<div class="nav"><span class="live"></span><b>openkee</b><span class="sep">/</span>earthquake<span class="r" id="upd"></span></div>
<div class="filters">
<button class="fbtn on" onclick="sp('day')">24h</button>
<button class="fbtn" onclick="sp('week')">7d</button>
<button class="fbtn" onclick="sp('month')">30d</button>
<button class="fbtn on" onclick="sm(0)" data-m="0">All</button>
<button class="fbtn" onclick="sm(2.5)" data-m="2.5">M2.5+</button>
<button class="fbtn" onclick="sm(4.5)" data-m="4.5">M4.5+</button>
<button class="fbtn" onclick="sm(5.5)" data-m="5.5">M5.5+</button>
</div>
<div class="stats" id="stats"></div>
<div class="ld" id="ld">Loading...</div>
<div id="map">
<div class="token-overlay" id="tokenOverlay">
<div class="token-box">
<h2>Mapbox Access Token</h2>
<p>Enter your Mapbox token to enable the map. It will be saved in your browser.</p>
<input type="text" id="tokenInput" placeholder="pk.eyJ1Ijo..." autocomplete="off"/>
<button onclick="saveToken()">Save & Load Map</button>
<div class="hint">Get a free token at <a href="https://account.mapbox.com/access-tokens/" target="_blank">mapbox.com</a></div>
</div>
</div>
</div>
<div class="list" id="list"></div>
<footer><span>USGS Earthquake Hazards Program</span><span id="ft"></span></footer>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script>
var API='https://earthquake.usgs.gov/fdsnws/event/1/query';
var P='day',M=0,map=null,geoData=null;

function saveToken(){
  var token=document.getElementById('tokenInput').value.trim();
  if(!token||!token.startsWith('pk.'))return;
  localStorage.setItem('mb_token',token);
  initMap(token);
}

function initMap(token){
  document.getElementById('tokenOverlay').classList.add('hidden');
  mapboxgl.accessToken=token;
  map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[0,20],zoom:1.5,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-right');
  map.on('load',function(){
    map.addSource('quakes',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'quake-circles',type:'circle',source:'quakes',paint:{
      'circle-radius':['interpolate',['linear'],['get','mag'],0,3,3,6,5,10,6,14,8,20],
      'circle-color':['interpolate',['linear'],['get','mag'],0,'#4ade80',3,'#facc15',5,'#fb923c',6,'#ef4444',8,'#dc2626'],
      'circle-opacity':0.6,'circle-stroke-width':1,
      'circle-stroke-color':['interpolate',['linear'],['get','mag'],0,'#4ade80',3,'#facc15',5,'#fb923c',6,'#ef4444']
    }});
    map.on('click','quake-circles',function(e){
      var p=e.features[0].properties;
      new mapboxgl.Popup({offset:10}).setLngLat(e.lngLat)
        .setHTML('<b>M'+parseFloat(p.mag).toFixed(1)+'</b> '+(p.place||'')+'<div class="pw">Depth: '+Math.round(p.depth)+'km</div>')
        .addTo(map);
    });
    map.on('mouseenter','quake-circles',function(){map.getCanvas().style.cursor='pointer'});
    map.on('mouseleave','quake-circles',function(){map.getCanvas().style.cursor=''});
    if(geoData)updateMapLayer();
    ld_();
  });
}

function updateMapLayer(){
  if(!map||!map.getSource('quakes'))return;
  map.getSource('quakes').setData(geoData);
}

function sp(p){P=p;document.querySelectorAll('.fbtn:not([data-m])').forEach(function(b){b.classList.toggle('on',b.textContent.indexOf(p==='day'?'24':p==='week'?'7':'30')>=0)});if(map)ld_()}
function sm(m){M=m;document.querySelectorAll('.fbtn[data-m]').forEach(function(b){b.classList.toggle('on',parseFloat(b.dataset.m)===m)});if(map)ld_()}

function mc(m){return m<3?'g':m<5?'y':m<6?'o':'r'}
function ago(t){var d=Math.round((Date.now()-t)/60000);if(d<60)return d+'m';if(d<1440)return Math.round(d/60)+'h';return Math.round(d/1440)+'d'}

function ld_(){
  document.getElementById('ld').classList.add('on');
  var end=new Date(),start=new Date();
  if(P==='day')start.setDate(start.getDate()-1);
  else if(P==='week')start.setDate(start.getDate()-7);
  else start.setDate(start.getDate()-30);
  var url=API+'?format=geojson&starttime='+start.toISOString().slice(0,10)+'&endtime='+end.toISOString().slice(0,10)+'&minmagnitude='+M+'&orderby=time';
  fetch(url).then(function(r){return r.json()}).then(function(d){
    document.getElementById('ld').classList.remove('on');
    var q=d.features||[];
    renderStats(q);renderList(q);
    geoData={type:'FeatureCollection',features:q.map(function(e){
      return{type:'Feature',geometry:{type:'Point',coordinates:e.geometry.coordinates},properties:{mag:e.properties.mag,place:e.properties.place,depth:e.geometry.coordinates[2]}};
    })};
    updateMapLayer();
    document.getElementById('upd').textContent=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('ft').textContent=q.length+' events';
  }).catch(function(e){document.getElementById('ld').textContent='Error: '+e.message})
}

function renderStats(q){
  var mx=0,dp=0,sg=0;
  q.forEach(function(e){var m=e.properties.mag;if(m>mx)mx=m;dp+=e.geometry.coordinates[2];if(m>=5)sg++});
  var av=q.length?Math.round(dp/q.length):0;
  document.getElementById('stats').innerHTML='<div class="stat"><div class="v">'+q.length+'</div><div class="l">Events</div></div><div class="stat"><div class="v">'+(mx?mx.toFixed(1):'-')+'</div><div class="l">Max</div></div><div class="stat"><div class="v">'+av+'km</div><div class="l">Avg Depth</div></div><div class="stat"><div class="v">'+sg+'</div><div class="l">M5+</div></div>';
}

function renderList(q){
  var s=q.slice().sort(function(a,b){return b.properties.time-a.properties.time});
  var html='';
  s.slice(0,50).forEach(function(e){
    var p=e.properties,m=p.mag||0,c=e.geometry.coordinates;
    html+='<div class="item" onclick="flyTo('+c[1]+','+c[0]+')"><div class="mag '+mc(m)+'">'+(m?m.toFixed(1):'?')+'</div><div class="info"><div class="place">'+(p.place||'Unknown')+'</div><div class="meta">'+Math.round(c[2])+'km deep</div></div><div class="ago">'+ago(p.time)+'</div></div>';
  });
  document.getElementById('list').innerHTML=html;
}

function flyTo(lat,lon){if(map)map.flyTo({center:[lon,lat],zoom:6,duration:1500})}

// Auto-init if token exists
var savedToken=localStorage.getItem('mb_token');
if(savedToken)initMap(savedToken);
</script>
</body>
</html>
