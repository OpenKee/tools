<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dev Tools</title>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--sf:#111;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.15);--tx:#e5e5e5;--mt:#666;--gn:#22c55e;--rd:#ef4444;--bl:#3b82f6;--yl:#eab308;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif}
body{font-family:var(--sans);color:var(--tx);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.nav{padding:.8rem 1.5rem;display:flex;align-items:center;gap:.5rem;font-size:.8rem;border-bottom:1px solid var(--bd);background:var(--sf)}
.nav b{font-weight:700;font-size:1rem;letter-spacing:-.02em}
.nav .sep{color:var(--mt)}
.nav .r{margin-left:auto;display:flex;gap:.5rem;align-items:center}
.hero{text-align:center;padding:3rem 1.5rem 2rem;border-bottom:1px solid var(--bd)}
.hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;letter-spacing:-.04em;margin-bottom:.5rem}
.hero h1 span{color:var(--gn)}
.hero p{color:var(--mt);font-size:.9rem;max-width:50ch;margin:0 auto;line-height:1.6}
.tool-tabs{display:flex;gap:.3rem;padding:.6rem 1.5rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tool-tab{background:0;border:1px solid var(--bd);color:var(--mt);font:inherit;font-size:.78rem;font-weight:500;padding:.35rem .9rem;border-radius:6px;cursor:pointer;transition:all .15s}
.tool-tab:hover{border-color:var(--bd2);color:var(--tx)}
.tool-tab.on{background:var(--bl);border-color:var(--bl);color:#fff}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-bottom:1px solid var(--bd)}
.stat{background:var(--sf);padding:.8rem 1rem;text-align:center}
.stat .v{font-size:1.3rem;font-weight:800;font-family:var(--mono)}
.stat .l{font-size:.6rem;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}
.stat .v.gn{color:var(--gn)}
.stat .v.rd{color:var(--rd)}
.main{display:grid;grid-template-columns:1fr 50px 1fr;flex:1;overflow:hidden}
.panel{display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:.6rem 1rem;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-size:.7rem;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;font-weight:600;flex-shrink:0}
.panel-header .actions{display:flex;gap:.3rem}
.panel-header button{background:0;border:1px solid var(--bd);color:var(--mt);font:inherit;font-size:.65rem;padding:.2rem .5rem;border-radius:4px;cursor:pointer;transition:all .15s}
.panel-header button:hover{border-color:var(--bd2);color:var(--tx)}
textarea{flex:1;width:100%;resize:none;background:var(--bg);color:var(--tx);border:none;padding:1rem;font-family:var(--mono);font-size:.82rem;line-height:1.7;outline:none;tab-size:2}
textarea::placeholder{color:var(--mt)}
.divider{background:var(--bd);display:flex;align-items:center;justify-content:center}
.divider svg{width:16px;height:16px;stroke:var(--mt);fill:none;stroke-width:2}
.actions-bar{padding:.8rem 1.5rem;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;flex-shrink:0}
.btn{height:2.2rem;padding:0 1.2rem;font:inherit;font-size:.78rem;font-weight:600;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn:hover{background:rgba(255,255,255,.06);border-color:var(--bd2)}
.btn.p{background:var(--gn);border-color:var(--gn);color:#000}
.btn.p:hover{background:#16a34a}
.btn.d{color:var(--rd);border-color:rgba(239,68,68,.3)}
.btn.d:hover{background:rgba(239,68,68,.1)}
.options{margin-left:auto;display:flex;gap:.6rem;align-items:center;font-size:.7rem;color:var(--mt)}
.options label{display:flex;align-items:center;gap:.3rem;cursor:pointer;user-select:none}
.options input[type=checkbox]{accent-color:var(--gn);width:14px;height:14px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gn);color:#000;padding:.5rem 1.2rem;border-radius:8px;font-size:.78rem;font-weight:600;transition:transform .3s ease;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0)}
.json-panel{display:grid;grid-template-columns:1fr 50px 1fr;flex:1;overflow:hidden}
.drop-zone{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,10,10,.9);border:2px dashed var(--gn);z-index:10;font-size:1rem;color:var(--gn);font-weight:600}
.drop-zone.active{display:flex}
@media(max-width:768px){.main{grid-template-columns:1fr;grid-template-rows:1fr auto 1fr}.stats-bar{grid-template-columns:repeat(2,1fr)}.options{margin-left:0;width:100%}}
</style>
</head>
<body>

<div class="nav"><b>openkee</b><span class="sep">/</span>dev-tools</div>

<div class="hero">
<h1>Dev <span>Tools</span></h1>
<p>Browser-based developer utilities. Pure frontend, no server, no data leaves your machine.</p>
</div>

<div class="tool-tabs" id="toolTabs">
<button class="tool-tab on" data-tool="css">CSS Compressor</button>
<button class="tool-tab" data-tool="json">JSON Formatter</button>
</div>
<div class="stats-bar" id="stats">
<div class="stat"><div class="v" id="s-orig">0 B</div><div class="l">Original</div></div>
<div class="stat"><div class="v" id="s-min">0 B</div><div class="l">Minified</div></div>
<div class="stat"><div class="v gn" id="s-save">0%</div><div class="l">Saved</div></div>
<div class="stat"><div class="v" id="s-time">0ms</div><div class="l">Time</div></div>
</div>

<div class="main">
<div class="panel" style="position:relative">
<div class="panel-header"><span>Input CSS</span><div class="actions"><button onclick="loadSample()">Sample</button><button onclick="clearInput()">Clear</button></div></div>
<textarea id="input" placeholder="Paste your CSS here..." spellcheck="false"></textarea>
<div class="drop-zone" id="dropZone">Drop .css file here</div>
</div>
<div class="divider"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></div>
<div class="panel">
<div class="panel-header"><span>Minified Output</span><div class="actions"><button onclick="copyOutput()">Copy</button><button onclick="downloadOutput()">Download</button></div></div>
<textarea id="output" readonly placeholder="Minified CSS will appear here..." spellcheck="false"></textarea>
</div>
</div>

<div class="actions-bar">
<button class="btn p" onclick="compress()">🔧 Compress</button>
<button class="btn d" onclick="clearAll()">Clear All</button>
<div class="options">
<label><input type="checkbox" id="optComments" checked> Remove comments</label>
<label><input type="checkbox" id="optWhitespace" checked> Minify whitespace</label>
<label><input type="checkbox" id="optColors" checked> Shorten colors</label>
<label><input type="checkbox" id="optZeros" checked> Clean zeros</label>
</div>
</div>

<div class="json-panel" id="jsonPanel" style="display:none">
<div class="panel" style="position:relative">
<div class="panel-header"><span>Input JSON</span><div class="actions"><button onclick="loadJsonSample()">Sample</button><button onclick="clearJsonInput()">Clear</button></div></div>
<textarea id="jsonInput" placeholder="Paste your JSON here..." spellcheck="false"></textarea>
</div>
<div class="divider"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></div>
<div class="panel">
<div class="panel-header"><span>Formatted Output</span><div class="actions"><button onclick="copyJsonOutput()">Copy</button><button onclick="downloadJsonOutput()">Download</button></div></div>
<textarea id="jsonOutput" readonly placeholder="Formatted JSON will appear here..." spellcheck="false"></textarea>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(1) + ' KB';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function compress() {
  const css = input.value;
  if (!css.trim()) return;

  const t0 = performance.now();
  let result = css;

  // Remove comments
  if (document.getElementById('optComments').checked) {
    result = result.replace(/\/\*[\s\S]*?\*\//g, '');
  }

  // Remove whitespace
  if (document.getElementById('optWhitespace').checked) {
    result = result.replace(/\s+/g, ' ');
    result = result.replace(/\s*{\s*/g, '{');
    result = result.replace(/\s*}\s*/g, '}');
    result = result.replace(/\s*;\s*/g, ';');
    result = result.replace(/\s*:\s*/g, ':');
    result = result.replace(/\s*,\s*/g, ',');
    result = result.replace(/\s*>\s*/g, '>');
    result = result.replace(/\s*\+\s*/g, '+');
    result = result.replace(/\s*~\s*/g, '~');
    result = result.replace(/;}/g, '}');
    result = result.trim();
  }

  // Shorten colors
  if (document.getElementById('optColors').checked) {
    // #aabbcc → #abc
    result = result.replace(/#([0-9a-fA-F])\1([0-9a-fA-F])\2([0-9a-fA-F])\3/g, '#$1$2$3');
    // rgb(255,255,255) → #fff, rgb(0,0,0) → #000
    result = result.replace(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/g, function(_, r, g, b) {
      r = parseInt(r); g = parseInt(g); b = parseInt(b);
      if (r > 255 || g > 255 || b > 255) return _;
      const hex = '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
      // Try to shorten #aabbcc → #abc
      if (hex[1]===hex[2] && hex[3]===hex[4] && hex[5]===hex[6]) {
        return '#' + hex[1] + hex[3] + hex[5];
      }
      return hex;
    });
    // Named colors to shorter hex
    const named = {white:'#fff',black:'#000',red:'#f00',lime:'#0f0',blue:'#00f',cyan:'#0ff',magenta:'#f0f',yellow:'#ff0'};
    for (const [name, hex] of Object.entries(named)) {
      result = result.replace(new RegExp(':' + name + '(;|})', 'gi'), ':' + hex + '$1');
    }
  }

  // Clean zeros
  if (document.getElementById('optZeros').checked) {
    result = result.replace(/:0(px|em|rem|vh|vw|vmin|vmax|%|pt|pc|in|mm|cm|ex|ch|lh)/g, ':0');
    result = result.replace(/ 0\.([0-9]+)/g, ' .$1');
    result = result.replace(/:0\.([0-9]+)/g, ':.$1');
    // 0.5s → .5s etc in values
    result = result.replace(/([ ,:])0\./g, '$1.');
  }

  const elapsed = (performance.now() - t0).toFixed(1);
  output.value = result;

  const origSize = new Blob([css]).size;
  const minSize = new Blob([result]).size;
  const saved = origSize > 0 ? ((1 - minSize / origSize) * 100).toFixed(1) : 0;

  document.getElementById('s-orig').textContent = fmtSize(origSize);
  document.getElementById('s-min').textContent = fmtSize(minSize);
  document.getElementById('s-save').textContent = saved + '%';
  document.getElementById('s-time').textContent = elapsed + 'ms';
}

function copyOutput() {
  if (!output.value) return;
  navigator.clipboard.writeText(output.value);
  showToast('Copied to clipboard');
}

function downloadOutput() {
  if (!output.value) return;
  const blob = new Blob([output.value], {type: 'text/css'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'minified.css';
  a.click();
  showToast('Downloaded minified.css');
}

function clearInput() { input.value = ''; }
function clearAll() { input.value = ''; output.value = '';
  ['s-orig','s-min','s-save','s-time'].forEach(id => {
    document.getElementById(id).textContent = id === 's-save' ? '0%' : id === 's-time' ? '0ms' : '0 B';
  });
}

function loadSample() {
  input.value = `/* Main Styles */
body {
  margin: 0;
  padding: 0px;
  font-family: 'Inter', sans-serif;
  background-color: #ffffff;
  color: rgb(51, 51, 51);
}

.container {
  max-width: 1200px;
  margin: 0px auto;
  padding: 2rem 1.5rem;
}

.header {
  background: linear-gradient(135deg, #aabbcc, #112233);
  padding: 1.0rem;
  border-radius: 8px;
}

/* Button styles */
.btn-primary {
  display: inline-block;
  background-color: #3b82f6;
  color: white;
  padding: 0.5rem 1.0rem;
  border-radius: 6px;
  border: 0px solid transparent;
  font-weight: 600;
  transition: all 0.2s ease;
}

.btn-primary:hover {
  background-color: #2563eb;
  transform: translateY(-1px);
}

/* Grid Layout */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem 0px;
}

.card {
  background: #f5f5f5;
  padding: 1.5rem;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
    gap: 1rem 0px;
  }
  .container {
    padding: 1rem 0.5rem;
  }
}`;
  compress();
}

// Auto-compress on input (debounced)
let timer;
input.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(compress, 500);
});

// Drag and drop
const dz = document.getElementById('dropZone');
input.parentElement.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
input.parentElement.addEventListener('dragleave', () => dz.classList.remove('active'));
input.parentElement.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && (file.type === 'text/css' || file.name.endsWith('.css'))) {
    const reader = new FileReader();
    reader.onload = () => { input.value = reader.result; compress(); };
    reader.readAsText(file);
  }
});

// Tool switching
document.getElementById('toolTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tool-tab');
  if (!tab) return;
  document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('on'));
  tab.classList.add('on');
  const tool = tab.dataset.tool;
  document.querySelector('.main').style.display = tool === 'css' ? 'grid' : 'none';
  document.getElementById('jsonPanel').style.display = tool === 'json' ? 'grid' : 'none';
  // Update stats labels
  if (tool === 'json') {
    document.querySelectorAll('.stat .l')[0].textContent = 'Original';
    document.querySelectorAll('.stat .l')[1].textContent = 'Formatted';
    document.querySelectorAll('.stat .l')[2].textContent = 'Lines';
    document.querySelectorAll('.stat .l')[3].textContent = 'Time';
  } else {
    document.querySelectorAll('.stat .l')[0].textContent = 'Original';
    document.querySelectorAll('.stat .l')[1].textContent = 'Minified';
    document.querySelectorAll('.stat .l')[2].textContent = 'Saved';
    document.querySelectorAll('.stat .l')[3].textContent = 'Time';
  }
});

// JSON Formatter
const jsonInput = document.getElementById('jsonInput');
const jsonOutput = document.getElementById('jsonOutput');

function formatJson() {
  const raw = jsonInput.value;
  if (!raw.trim()) return;
  const t0 = performance.now();
  try {
    const parsed = JSON.parse(raw);
    const formatted = JSON.stringify(parsed, null, 2);
    jsonOutput.value = formatted;
    const elapsed = (performance.now() - t0).toFixed(1);
    const origSize = new Blob([raw]).size;
    const fmtSize = new Blob([formatted]).size;
    const lines = formatted.split('\n').length;
    document.getElementById('s-orig').textContent = fmtSizeB(origSize);
    document.getElementById('s-min').textContent = fmtSizeB(fmtSize);
    document.getElementById('s-save').textContent = lines;
    document.getElementById('s-time').textContent = elapsed + 'ms';
    jsonOutput.style.color = '';
  } catch (e) {
    jsonOutput.value = '❌ Invalid JSON:\n' + e.message;
    jsonOutput.style.color = 'var(--rd)';
  }
}

function fmtSizeB(b) { return b < 1024 ? b + ' B' : (b / 1024).toFixed(1) + ' KB'; }

function loadJsonSample() {
  jsonInput.value = JSON.stringify({
    name: "OpenKee",
    tools: ["Rate Board", "Crypto Board", "CSS Compressor"],
    stats: { total: 14, categories: 5, active: true },
    github: "https://github.com/OpenKee",
    config: { theme: "dark", language: "zh", features: { offline: false, tracking: false } }
  });
  formatJson();
}
function clearJsonInput() { jsonInput.value = ''; jsonOutput.value = '';
  ['s-orig','s-min','s-save','s-time'].forEach(id => {
    document.getElementById(id).textContent = id === 's-save' ? '0%' : id === 's-time' ? '0ms' : '0 B';
  });
}
function copyJsonOutput() { if (!jsonOutput.value) return; navigator.clipboard.writeText(jsonOutput.value); showToast('Copied'); }
function downloadJsonOutput() { if (!jsonOutput.value) return; const b = new Blob([jsonOutput.value],{type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'formatted.json'; a.click(); showToast('Downloaded'); }

jsonInput.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(formatJson, 500); });
</script>
</body>
</html>
