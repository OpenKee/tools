<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Atlas — Feline Photo Explorer</title>
    <meta name="description" content="Browse hundreds of cat photos by breed, with temperament, origin and lifespan details via The Cat API." />
    <meta name="theme-color" content="#fb923c" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar cat-topbar">
      <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
      <div class="topbar-right">
        <button id="langBtn" class="ok-lang-toggle" type="button">中文</button>
      </div>
    </nav>

    <main class="shell">
      <header class="masthead">
        <p class="eyebrow" data-ok-i18n="eyebrow">The Cat API · Feline Atlas</p>
        <h1 data-ok-i18n="title">Cat Atlas</h1>
        <p class="lead" data-ok-i18n="lead">Browse hundreds of cat photos by breed. Click any photo to see breed temperament, origin, lifespan and more.</p>
      </header>

      <section class="controls">
        <div class="filter-row">
          <label class="filter-label" for="breedSelect" data-ok-i18n="breed">Breed</label>
          <select id="breedSelect" class="filter-select" aria-label="Breed filter">
            <option value="" data-ok-i18n="allBreeds">All breeds</option>
          </select>
          <button id="refreshBtn" type="button" class="ok-btn-ghost refresh-btn">
            <span class="refresh-icon">↻</span>
            <span data-ok-i18n="refresh">Refresh</span>
          </button>
          <span id="countInfo" class="count-info"></span>
        </div>
      </section>

      <div id="loadingRow" class="ok-loading">
        <span class="ok-spinner"></span>
        <span data-ok-i18n="loading">Loading…</span>
      </div>

      <div id="catGrid" class="cat-grid"></div>

      <div id="emptyState" class="empty-state" style="display:none;" data-ok-i18n="empty">No cats found.</div>

      <div class="load-more-wrap">
        <button id="loadMoreBtn" type="button" class="ok-btn-ghost load-more-btn" data-ok-i18n="loadMore" hidden>Load more</button>
      </div>
    </main>

    <div id="detailModal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <footer class="ok-footer">
      <span data-ok-i18n="dataSource">Data: The Cat API</span>
      <span><a href="https://openkee.github.io/" data-ok-i18n="allProjects">All projects ↗</a></span>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
