<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Crypto Board — Live Cryptocurrency Prices</title>
<meta name="description" content="Real-time cryptocurrency prices, market cap, and 7-day trends. Powered by CoinGecko free API.">
<meta property="og:title" content="Crypto Board"><meta property="og:description" content="Live cryptocurrency prices, market cap, and 7-day trends. 9 currencies supported." />
    <meta property="og:type" content="website">
<meta property="og:url" content="https://openkee.github.io/crypto-board/">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--panel:#101018;--line:rgba(255,255,255,0.06);--text:#e8e8f0;--muted:#6868a0;--accent:#7c5cfc;--green:#30d080;--red:#f04060;--gold:#f0c040}
*{box-sizing:border-box;margin:0}body{font-family:"Inter",system-ui,sans-serif;color:var(--text);background:var(--bg)}
h1,h2,p,strong,span{margin:0}a{color:var(--accent);text-decoration:none}
.shell{width:min(1100px,calc(100% - 1.5rem));margin:0 auto;padding:1rem 0 4rem}
.masthead{display:flex;justify-content:space-between;align-items:start;padding:0.3rem 0 1rem;border-bottom:1px solid var(--line)}
.eyebrow{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--accent);font-weight:600}
h1{margin-top:0.3rem;font-size:clamp(2rem,5vw,3rem);line-height:0.95;letter-spacing:-0.04em;font-weight:800}
.lead{margin-top:0.5rem;color:var(--muted);font-size:0.88rem}
.header-right{display:flex;gap:0.5rem;align-items:center}
.btn{font:inherit;height:2.2rem;padding:0 0.7rem;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:0.78rem;color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:1.2rem 0;border-bottom:1px solid var(--line)}
.stat{padding:0 1rem;border-right:1px solid var(--line)}.stat:last-child{border-right:none}
.stat .s-label{font-size:0.66rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}
.stat .s-val{font-size:1.6rem;font-weight:800;margin-top:0.15rem}
.table{margin-top:1rem}
.thead{display:grid;grid-template-columns:40px 1fr 120px 100px 100px 100px 80px;gap:0.5rem;padding:0.6rem 0.8rem;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);border-bottom:1px solid var(--line)}
.trow{display:grid;grid-template-columns:40px 1fr 120px 100px 100px 100px 80px;gap:0.5rem;padding:0.7rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;font-size:0.85rem;transition:background 100ms}
.trow:hover{background:var(--panel)}
.coin-name{font-weight:600;display:flex;align-items:center;gap:0.5rem}
.coin-icon{width:22px;height:22px;border-radius:50%}
.coin-sub{font-size:0.72rem;color:var(--muted);text-transform:uppercase}
.price{font-family:"JetBrains Mono",monospace;font-weight:600}
.change{font-family:"JetBrains Mono",monospace;font-size:0.82rem;font-weight:600}
.change.up{color:var(--green)}.change.down{color:var(--red)}
.mcap{font-size:0.78rem;color:var(--muted)}
.spark{display:flex;align-items:end;gap:1px;height:24px}
.spark-bar{width:3px;border-radius:1px;transition:height 0.3s}
.updated{text-align:center;padding:0.8rem;font-size:0.72rem;color:var(--muted)}
.loading{text-align:center;padding:3rem;color:var(--muted)}
.footer{padding:2rem 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted)}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.stat{border-right:none;border-bottom:1px solid var(--line)}.thead,.trow{grid-template-columns:40px 1fr 100px 80px}.trow>:nth-child(5),.trow>:nth-child(6),.thead>:nth-child(5),.thead>:nth-child(6){display:none}.footer{flex-direction:column;gap:0.5rem;text-align:center}}
</style></head><body><div class="shell">
<header class="masthead"><div><p class="eyebrow">Cryptocurrency tracker</p><h1>Crypto Board</h1><p class="lead">Live prices, market cap, and 7-day trends. No sign-up.</p></div><div class="header-right"><button class="btn" id="refreshBtn">↻ Refresh</button><select class="btn" id="currencySelect"><option value="usd">$ USD</option><option value="cny">¥ CNY</option><option value="eur">€ EUR</option><option value="gbp">£ GBP</option><option value="jpy">¥ JPY</option><option value="krw">₩ KRW</option><option value="hkd">$ HKD</option><option value="twd">$ TWD</option><option value="sgd">$ SGD</option></select><button class="btn" id="langToggle" type="button">中文</button><a href="https://openkee.github.io/" class="btn">All projects ↗</a></div></header>
<section class="stats" id="stats"></section>
<section class="table"><div class="thead"><span>#</span><span>Name</span><span>Price</span><span>24h</span><span>7d</span><span>Market Cap</span><span>7d</span></div><div id="coinList"></div></section>
<div class="updated" id="updated"></div>
<footer class="openkfoooter" style="margin-top:2rem;padding:1.2rem 0;border-top:1px solid rgba(255,255,255,0.06);text-align:center;font-family:Inter,system-ui,sans-serif;font-size:0.72rem;color:#6868a0;letter-spacing:0.03em;">
    Built by <a href="https://github.com/OpenKee" target="_blank" rel="noreferrer" style="color:#7c5cfc;text-decoration:none;">OpenKee</a> &middot; <a href="https://openkee.github.io/" target="_blank" rel="noreferrer" style="color:#7c5cfc;text-decoration:none;">All projects</a>
  </footer>
</div><script>
const coinList=document.getElementById('coinList'),statsEl=document.getElementById('stats'),updatedEl=document.getElementById('updated'),refreshBtn=document.getElementById('refreshBtn'),langToggle=document.getElementById('langToggle'),currencySelect=document.getElementById('currencySelect');

const SYMBOLS={usd:'$',cny:'¥',eur:'€',gbp:'£',jpy:'¥',krw:'₩',hkd:'$',twd:'$',sgd:'$'};
const CURRENCY_NAMES={usd:{en:'USD',zh:'美元'},cny:{en:'CNY',zh:'人民币'},eur:{en:'EUR',zh:'欧元'},gbp:{en:'GBP',zh:'英镑'},jpy:{en:'JPY',zh:'日元'},krw:{en:'KRW',zh:'韩元'},hkd:{en:'HKD',zh:'港币'},twd:{en:'TWD',zh:'新台币'},sgd:{en:'SGD',zh:'新加坡元'}};

const i18n={
en:{eyebrow:'Cryptocurrency tracker',title:'Crypto Board',lead:'Live prices, market cap, and 7-day trends. No sign-up.',refresh:'↻ Refresh',allProjects:'All projects ↗',tracked:'Tracked',totalMcap:'Total Market Cap',gainers:'24h Gainers',losers:'24h Losers',loading:'Loading…',error:'Error: CoinGecko free API may be rate-limited.',updated:'Updated',rank:'#',name:'Name',price:'Price',h24:'24h',d7:'7d',mcap:'Market Cap'},
zh:{eyebrow:'加密货币追踪器',title:'Crypto Board',lead:'实时行情、市值和 7 天走势。无需注册。',refresh:'↻ 刷新',allProjects:'全部项目 ↗',tracked:'已追踪',totalMcap:'总市值',gainers:'24h 涨',losers:'24h 跌',loading:'加载中…',error:'出错：CoinGecko 免费 API 可能限流了。',updated:'更新于',rank:'#',name:'名称',price:'价格',h24:'24h',d7:'7天',mcap:'市值'}
};

let lang=localStorage.getItem('openkee-lang')||'en',vsCurrency='usd';
function t(k){return i18n[lang][k]||k}
function sym(){return SYMBOLS[vsCurrency]||'$'}

function applyLang(){
  document.documentElement.lang=lang;
  langToggle.textContent=lang==='en'?'中文':'EN';
  document.querySelector('.eyebrow').textContent=t('eyebrow');
  document.querySelector('h1').textContent=t('title');
  document.querySelector('.lead').textContent=t('lead');
  refreshBtn.textContent=t('refresh');
  const th=document.querySelectorAll('.thead span');
  th[0].textContent=t('rank');th[1].textContent=t('name');th[2].textContent=t('price');
  th[3].textContent=t('h24');th[4].textContent=t('d7');th[5].textContent=t('mcap');th[6].textContent=t('d7');
}

langToggle.addEventListener('click',()=>{lang=lang==='en'?'zh':'en';localStorage.setItem('openkee-lang',lang);applyLang()});
currencySelect.addEventListener('change',()=>{vsCurrency=currencySelect.value;load()});

function fmt(n){
  const s=sym();
  if(n>=1e12)return s+(n/1e12).toFixed(2)+'T';
  if(n>=1e9)return s+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return s+(n/1e6).toFixed(2)+'M';
  if(n>=1)return s+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return s+n.toPrecision(4)
}
function pct(n){if(n==null)return'—';const cls=n>=0?'up':'down';return'<span class="change '+cls+'">'+(n>=0?'+':'')+n.toFixed(2)+'%</span>'}
function spark(data){if(!data||!data.length)return'';const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;return'<div class="spark">'+data.map(v=>'<div class="spark-bar" style="height:'+((v-mn)/rng*22+2)+'px;background:'+(v>=data[data.length-1]?'var(--green)':'var(--red)')+'"></div>').join('')+'</div>'}

async function load(){
  coinList.innerHTML='<div class="loading">'+t('loading')+'</div>';
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency='+vsCurrency+'&order=market_cap_desc&per_page=30&page=1&sparkline=true&price_change_percentage=24h,7d');
    if(!r.ok)throw new Error(r.status);
    const coins=await r.json();
    const totalMcap=coins.reduce((s,c)=>s+(c.market_cap||0),0);
    const gainers=coins.filter(c=>(c.price_change_percentage_24h||0)>0).length;
    statsEl.innerHTML='<div class="stat"><div class="s-label">'+t('tracked')+'</div><div class="s-val">'+coins.length+'</div></div><div class="stat"><div class="s-label">'+t('totalMcap')+'</div><div class="s-val" style="font-size:1.2rem">'+fmt(totalMcap)+'</div></div><div class="stat"><div class="s-label">'+t('gainers')+'</div><div class="s-val" style="color:var(--green)">'+gainers+'</div></div><div class="stat"><div class="s-label">'+t('losers')+'</div><div class="s-val" style="color:var(--red)">'+(coins.length-gainers)+'</div></div>';
    coinList.innerHTML=coins.map((c,i)=>'<div class="trow"><span style="color:var(--muted);font-size:0.78rem">'+(i+1)+'</span><div class="coin-name"><img class="coin-icon" src="'+c.image+'" alt=""><div><div>'+c.name+'</div><div class="coin-sub">'+c.symbol+'</div></div></div><span class="price">'+fmt(c.current_price)+'</span>'+pct(c.price_change_percentage_24h)+pct(c.price_change_percentage_7d_in_currency)+'<span class="mcap">'+fmt(c.market_cap)+'</span>'+spark(c.sparkline_in_7d?.price)+'</div>').join('');
    updatedEl.textContent=t('updated')+': '+new Date().toLocaleString(lang==='en'?'en-US':'zh-CN');
  }catch(e){coinList.innerHTML='<div class="loading">'+t('error')+'</div>'}
}

refreshBtn.addEventListener('click',load);
applyLang();
load();
setInterval(load,120000);
</script></body></html>
