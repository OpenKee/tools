<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Movie Search</title>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--sf:#111;--sf2:#1a1a1a;--bd:#222;--tx:#e8e8e8;--mt:#888;--yl:#f5c518;--rd:#e74c3c;--bl:#3498db}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC",system-ui,sans-serif;color:var(--tx);background:var(--bg);min-height:100vh}
a{color:var(--tx);text-decoration:none}

.nav{padding:1rem 1.5rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;font-size:.82rem}
.nav .dot{width:8px;height:8px;border-radius:50%;background:var(--yl)}
.nav .path{color:var(--mt)}
.nav .path b{color:var(--tx);font-weight:600}

.hero{text-align:center;padding:3rem 1.5rem 2rem}
.hero h1{font-size:2rem;font-weight:700;margin-bottom:.3rem}
.hero .sub{color:var(--mt);font-size:.85rem}

.search{max-width:500px;margin:0 auto 2rem;padding:0 1.5rem}
.search form{display:flex;gap:0;border:2px solid var(--bd);border-radius:10px;overflow:hidden;transition:border-color .2s}
.search form:focus-within{border-color:var(--yl)}
.search input{flex:1;height:3rem;padding:0 1rem;background:var(--sf);border:none;outline:none;color:var(--tx);font:inherit;font-size:.9rem}
.search input::placeholder{color:var(--mt)}
.search button{height:3rem;padding:0 1.5rem;background:var(--yl);color:#000;border:none;font:inherit;font-weight:700;font-size:.85rem;cursor:pointer;transition:opacity .15s}
.search button:hover{opacity:.9}
.search button:disabled{opacity:.4}

.loading{text-align:center;padding:2rem;display:none;color:var(--mt);font-size:.85rem}
.loading.on{display:block}
.error{text-align:center;padding:1rem;color:var(--rd);font-size:.85rem;display:none}
.error.on{display:block}

.results{max-width:900px;margin:0 auto;padding:0 1.5rem 2rem}
.count{font-size:.75rem;color:var(--mt);margin-bottom:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
.card{cursor:pointer;transition:transform .2s}
.card:hover{transform:translateY(-4px)}
.card .poster{width:100%;aspect-ratio:2/3;background:var(--sf2);border-radius:8px;overflow:hidden;position:relative}
.card .poster img{width:100%;height:100%;object-fit:cover;display:block}
.card .poster .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--mt);background:var(--sf2)}
.card .info{padding:.5rem 0}
.card .title{font-size:.82rem;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:.72rem;color:var(--mt);margin-top:.15rem}

/* DETAIL MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto;padding:2rem}
.overlay.on{display:block}
.detail{max-width:700px;margin:0 auto;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.detail .close{position:sticky;top:0;display:flex;justify-content:flex-end;padding:.5rem;background:rgba(0,0,0,.7);z-index:1}
.detail .close button{background:0;border:1px solid var(--bd);color:var(--tx);width:2rem;height:2rem;border-radius:50%;cursor:pointer;font-size:1rem}
.detail .top{display:flex;gap:1.5rem;padding:1.5rem}
.detail .poster-lg{width:180px;flex-shrink:0;border-radius:8px;overflow:hidden}
.detail .poster-lg img{width:100%;display:block}
.detail .info-lg{flex:1}
.detail .info-lg h2{font-size:1.3rem;font-weight:700;margin-bottom:.3rem}
.detail .info-lg .meta{font-size:.8rem;color:var(--mt);margin-bottom:.8rem;line-height:1.6}
.detail .info-lg .meta span{margin-right:.8rem}
.detail .rating{display:inline-flex;align-items:center;gap:.3rem;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);padding:.2rem .5rem;border-radius:4px;font-size:.82rem;font-weight:700;color:var(--yl)}
.detail .plot{font-size:.85rem;color:var(--mt);line-height:1.7;margin-bottom:1rem}
.detail .badges{display:flex;flex-wrap:wrap;gap:.3rem}
.detail .badge{font-size:.7rem;padding:.15rem .5rem;border:1px solid var(--bd);border-radius:4px;color:var(--mt)}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:.75rem}
  .detail .top{flex-direction:column}
  .detail .poster-lg{width:100%}
}
</style>
</head>
<body>

<div class="nav"><span class="dot"></span><span class="path"><b>openkee</b> / tools / movie-search</span></div>

<div class="hero">
<h1>🎬 Movie Search</h1>
<div class="sub">搜索电影、剧集，查看详细信息</div>
</div>

<div class="search">
<form onsubmit="go();return false">
<input type="text" id="inp" placeholder="输入电影名…" autocomplete="off"/>
<button type="submit" id="btn">搜索</button>
</form>
<div style="display:flex;gap:.5rem;margin-top:.5rem">
  <select id="typeFilter" style="flex:1;height:2rem;background:#111;border:1px solid #222;color:#e8e8e8;border-radius:6px;font:inherit;font-size:.78rem;padding:0 .5rem">
    <option value="">全部类型</option>
    <option value="movie">电影</option>
    <option value="series">剧集</option>
  </select>
  <input type="text" id="yearInput" placeholder="年份（可选）" style="width:100px;height:2rem;background:#111;border:1px solid #222;color:#e8e8e8;border-radius:6px;font:inherit;font-size:.78rem;padding:0 .5rem" maxlength="4">
</div>
</div>
<div style="text-align:center;font-size:.72rem;color:#555;margin-top:.4rem;padding:0 1.5rem">支持英文搜索 · 中文片名建议用英文名搜索（如 Inception 而非 盗梦空间）</div>

<div class="loading" id="ld">搜索中…</div>
<div class="error" id="er"></div>
<div class="results" id="out"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
<div class="detail" id="detail"></div>
</div>

<script>
var KEY='3e974fca';
var $=function(id){return document.getElementById(id)};
var typing;

$('inp').addEventListener('input',function(){
  clearTimeout(typing);
  var v=this.value.trim();
  if(v.length>=2)typing=setTimeout(function(){go()},500);
});

function go(){
  var q=$('inp').value.trim();if(!q)return;
  var btn=$('btn');btn.disabled=true;
  $('out').innerHTML='';$('er').classList.remove('on');$('ld').classList.add('on');
  var type=$('typeFilter').value||'movie';
  var year=$('yearInput').value;
  var url='https://www.omdbapi.com/?s='+encodeURIComponent(q)+'&apikey='+KEY+'&type='+type;
  if(year)url+='&y='+year;
  fetch(url)
    .then(function(r){return r.json()})
    .then(function(d){
      $('ld').classList.remove('on');
      if(d.Response==='False'){throw Error(d.Error||'没有结果')}
      renderGrid(d.Search,d.totalResults,q);
    })
    .catch(function(e){$('er').textContent=e.message;$('er').classList.add('on')})
    .finally(function(){btn.disabled=false;$('ld').classList.remove('on')});
}

function renderGrid(items,total,q){
  var html='<div class="count">找到 '+total+' 个结果: "'+q+'"</div><div class="grid">';
  items.forEach(function(m){
    var poster=m.Poster&&m.Poster!=='N/A'?'<img src="'+m.Poster+'" alt="'+m.Title+'" loading="lazy">':'<div class="no-img">🎬</div>';
    html+='<div class="card" onclick="loadDetail(\''+m.imdbID+'\')">'+
      '<div class="poster">'+poster+'</div>'+
      '<div class="info"><div class="title">'+m.Title+'</div><div class="meta">'+m.Year+' · '+(m.Type==='movie'?'电影':'剧集')+'</div></div>'+
    '</div>';
  });
  html+='</div>';
  $('out').innerHTML=html;
}

function loadDetail(id){
  fetch('https://www.omdbapi.com/?i='+id+'&apikey='+KEY+'&plot=full')
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.Response==='false')return;
      var poster=d.Poster&&d.Poster!=='N/A'?'<img src="'+d.Poster+'">':'<div style="width:180px;height:270px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:3rem;border-radius:8px">🎬</div>';
      var genres=d.Genre?d.Genre.split(', ').map(function(g){return'<span class="badge">'+g+'</span>'}).join(''):'';
      var html='<div class="close"><button onclick="closeDetail()">✕</button></div>'+
        '<div class="top">'+
          '<div class="poster-lg">'+poster+'</div>'+
          '<div class="info-lg">'+
            '<h2>'+d.Title+'</h2>'+
            '<div class="meta">'+
              '<span>📅 '+d.Year+'</span>'+
              '<span>⏱ '+d.Runtime+'</span>'+
              '<span>🌍 '+d.Language+'</span><br>'+
              '<span>🎬 '+d.Director+'</span><br>'+
              '<span>🎭 '+d.Actors+'</span>'+
            '</div>'+
            (d.imdbRating!=='N/A'?'<div class="rating">⭐ '+d.imdbRating+'/10 <span style="color:var(--mt);font-size:.7rem;font-weight:400">('+d.imdbVotes+' votes)</span></div>':'')+
          '</div>'+
        '</div>'+
        '<div style="padding:0 1.5rem 1.5rem">'+
          (d.Plot&&d.Plot!=='N/A'?'<div class="plot">'+d.Plot+'</div>':'')+
          '<div class="badges">'+genres+'</div>'+
        '</div>';
      $('detail').innerHTML=html;
      $('overlay').classList.add('on');
    });
}

function closeDetail(){$('overlay').classList.remove('on')}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDetail()});
</script>
</body>
</html>
