<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas Info — Country Encyclopedia</title>
<meta name="description" content="Explore any country: flag, population, languages, currencies, borders, and more. REST Countries API.">
<meta property="og:title" content="Atlas Info"><meta property="og:description" content="Explore any country: flag, population, languages, currencies, borders. REST Countries API." />
    <meta property="og:type" content="website">
<meta property="og:url" content="https://openkee.github.io/atlas-info/">
<meta name="theme-color" content="#0c1220">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1220;--panel:rgba(16,28,48,0.6);--line:rgba(100,160,255,0.1);--text:#d8e4f0;--muted:#6888b0;--accent:#4090ff;--green:#40d080;--gold:#f0c040}
*{box-sizing:border-box;margin:0}body{font-family:"Inter",system-ui,sans-serif;color:var(--text);background:var(--bg)}
h1,h2,h3,p,strong,span{margin:0}a{color:var(--accent);text-decoration:none}
.shell{width:min(1000px,calc(100% - 1.5rem));margin:0 auto;padding:1rem 0 4rem}
.masthead{padding:0.3rem 0 1rem;border-bottom:1px solid var(--line)}
.eyebrow{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--accent);font-weight:600}
h1{margin-top:0.3rem;font-size:clamp(2rem,5vw,3rem);line-height:0.95;letter-spacing:-0.04em;font-weight:800}
.lead{margin-top:0.5rem;color:var(--muted);font-size:0.88rem}
.search{margin-top:0.8rem;display:flex;gap:0.5rem;padding:0.6rem 0;border-bottom:1px solid var(--line)}
.search input{flex:1;font:inherit;height:2.4rem;padding:0 0.7rem;border:1px solid var(--line);background:rgba(16,28,48,0.5);color:var(--text);font-size:0.9rem}
.search button{font:inherit;height:2.4rem;padding:0 1rem;border:1px solid var(--accent);background:var(--accent);color:white;cursor:pointer;font-weight:600}
.region-bar{display:flex;gap:0.3rem;margin-top:0.4rem;flex-wrap:wrap}
.region-btn{font:inherit;padding:0.25rem 0.6rem;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:0.76rem;color:var(--muted);border-radius:12px}
.region-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(64,144,255,0.1)}
.card{background:var(--panel);border:1px solid var(--line);padding:1.2rem;margin-top:1rem;border-radius:8px;display:grid;grid-template-columns:auto 1fr;gap:1.2rem;align-items:start}
.flag{font-size:3.5rem;line-height:1}
.info h2{font-size:1.4rem;font-weight:700}
.info .native{font-size:0.82rem;color:var(--muted);margin-top:0.15rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.6rem;margin-top:1rem}
.item .i-label{font-size:0.66rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted)}
.item .i-val{font-weight:600;font-size:0.9rem;margin-top:0.1rem}
.borders{margin-top:1rem}
.borders h3{font-size:0.82rem;color:var(--muted);margin-bottom:0.4rem}
.border-chips{display:flex;gap:0.3rem;flex-wrap:wrap}
.border-chip{font:inherit;padding:0.25rem 0.5rem;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:0.76rem;border-radius:4px;color:var(--text)}
.border-chip:hover{border-color:var(--accent);color:var(--accent)}
.map-link{margin-top:0.8rem;font-size:0.78rem}
.result-count{font-size:0.72rem;color:var(--muted);margin-top:0.5rem}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.5rem;margin-top:0.8rem}
.country-mini{display:flex;gap:0.5rem;align-items:center;padding:0.5rem;border:1px solid var(--line);cursor:pointer;border-radius:6px;transition:all 150ms}
.country-mini:hover{border-color:var(--accent);background:var(--panel)}
.country-mini .c-flag{font-size:1.3rem}.country-mini .c-name{font-size:0.82rem;font-weight:500}.country-mini .c-sub{font-size:0.68rem;color:var(--muted)}
.footer{padding:2rem 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted)}
@media(max-width:700px){.card{grid-template-columns:1fr;}.flag{font-size:2.5rem}.grid{grid-template-columns:repeat(2,1fr)}.footer{flex-direction:column;gap:0.5rem;text-align:center}}
</style></head><body><div class="shell">
<header class="masthead" style="display:flex;justify-content:space-between;align-items:start">
<div><p class="eyebrow">Country encyclopedia</p><h1>Atlas Info</h1><p class="lead">Search any country. Flag, population, languages, currencies, borders — all from REST Countries.</p></div>
<div style="display:flex;gap:0.5rem;align-items:center"><a href="https://openkee.github.io/" style="font-size:0.82rem;padding:0.4rem 0.8rem;border:1px solid var(--line);border-radius:6px;color:var(--text)">All projects ↗</a><button id="langToggle" style="font:inherit;height:2rem;padding:0 0.6rem;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:0.78rem;border-radius:6px;color:var(--text)">中文</button></div>
</header>
<section class="search"><input id="searchInput" type="text" placeholder="Search country…" autocomplete="off"><button id="searchBtn">Search</button></section>
<div class="region-bar" id="regionBar"></div>
<div id="resultCount" class="result-count"></div>
<div id="countryGrid" class="country-grid"></div>
<div id="detailCard" style="display:none"></div>
<footer class="openkfoooter" style="margin-top:2rem;padding:1.2rem 0;border-top:1px solid rgba(100,160,255,0.1);text-align:center;font-family:Inter,system-ui,sans-serif;font-size:0.72rem;color:#6888b0;letter-spacing:0.03em;">
    Built by <a href="https://github.com/OpenKee" target="_blank" rel="noreferrer" style="color:#4090ff;text-decoration:none;">OpenKee</a> &middot; <a href="https://openkee.github.io/" target="_blank" rel="noreferrer" style="color:#4090ff;text-decoration:none;">All projects</a>
  </footer>
</div><script>
const searchInput=document.getElementById('searchInput'),searchBtn=document.getElementById('searchBtn'),regionBar=document.getElementById('regionBar'),countryGrid=document.getElementById('countryGrid'),detailCard=document.getElementById('detailCard'),resultCount=document.getElementById('resultCount'),langToggle=document.getElementById('langToggle');

const REGIONS=[{k:'',l:{en:'All',zh:'全部'}},{k:'africa',l:{en:'Africa',zh:'非洲'}},{k:'americas',l:{en:'Americas',zh:'美洲'}},{k:'asia',l:{en:'Asia',zh:'亚洲'}},{k:'europe',l:{en:'Europe',zh:'欧洲'}},{k:'oceania',l:{en:'Oceania',zh:'大洋洲'}}];

const i18n={
en:{eyebrow:'Country encyclopedia',title:'Atlas Info',lead:'Search any country. Flag, population, languages, currencies, borders — all from REST Countries.',search:'Search',allProjects:'All projects ↗',capital:'Capital',population:'Population',region:'Region',subregion:'Subregion',languages:'Languages',currencies:'Currencies',borders:'Borders',openMaps:'Google Maps',openOSM:'OpenStreetMap',none:'None',countries:'countries'},
zh:{eyebrow:'国家百科',title:'Atlas Info',lead:'搜索任意国家。国旗、人口、语言、货币、边境 — 全部来自 REST Countries。',search:'搜索',allProjects:'全部项目 ↗',capital:'首都',population:'人口',region:'地区',subregion:'子地区',languages:'语言',currencies:'货币',borders:'边境',openMaps:'Google 地图',openOSM:'OpenStreetMap',none:'无',countries:'个国家'}
};

let allCountries=[],activeRegion='',lang=localStorage.getItem('openkee-lang')||'en';
function t(k){return i18n[lang][k]||k}
function num(n){return new Intl.NumberFormat().format(n)}

function applyLang(){
  document.documentElement.lang=lang;
  langToggle.textContent=lang==='en'?'中文':'EN';
  document.querySelector('.eyebrow').textContent=t('eyebrow');
  document.querySelector('h1').textContent=t('title');
  document.querySelector('.lead').textContent=t('lead');
  searchBtn.textContent=t('search');
  searchInput.placeholder=lang==='en'?'Search country…':'搜索国家…';
  renderBar();
}

langToggle.addEventListener('click',()=>{lang=lang==='en'?'zh':'en';localStorage.setItem('openkee-lang',lang);applyLang()});

async function loadAll(){
try{
const r=await fetch('https://restcountries.com/v3.1/all?fields=name,flags,population,region,cca3');
if(!r.ok)throw new Error(r.status);
const data=await r.json();
if(!Array.isArray(data))throw new Error('Not array');
allCountries=data.sort((a,b)=>(a.name?.common||'').localeCompare(b.name?.common||''));
renderBar();renderGrid(allCountries);
}catch(e){countryGrid.innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted)">'+e.message+'</div>'}
}

function renderBar(){
  regionBar.innerHTML=REGIONS.map(r=>'<button class="region-btn'+(activeRegion===r.k?' active':'')+'" data-r="'+r.k+'">'+r.l[lang]+'</button>').join('');
  regionBar.querySelectorAll('[data-r]').forEach(b=>b.addEventListener('click',()=>{activeRegion=b.dataset.r;renderBar();filter()}))
}

function filter(){
  const q=searchInput.value.toLowerCase();
  let list=allCountries;
  if(activeRegion)list=list.filter(c=>c.region?.toLowerCase()===activeRegion);
  if(q)list=list.filter(c=>(c.name?.common||'').toLowerCase().includes(q)||(c.name?.official||'').toLowerCase().includes(q));
  renderGrid(list)
}

function renderGrid(countries){
  resultCount.textContent=countries.length+' '+t('countries');
  countryGrid.innerHTML=countries.map(c=>'<div class="country-mini" data-code="'+c.cca3+'"><span class="c-flag">'+(c.flags?.emoji||'')+'</span><div><div class="c-name">'+(c.name?.common||'')+'</div><div class="c-sub">'+(c.region||'')+' · '+num(c.population||0)+'</div></div></div>').join('');
  countryGrid.querySelectorAll('[data-code]').forEach(el=>el.addEventListener('click',()=>showDetail(el.dataset.code)))
}

async function showDetail(code){
  let c=allCountries.find(x=>x.cca3===code);if(!c)return;
  try{const r=await fetch('https://restcountries.com/v3.1/alpha/'+code+'?fields=name,flags,population,region,subregion,capital,languages,currencies,borders,cca3,latlng,maps');if(r.ok)c=await r.json()}catch{}
  const langs=c.languages?Object.values(c.languages).join(', '):'—';
  const currs=c.currencies?Object.values(c.currencies).map(x=>x.name+' ('+(x.symbol||'')+')').join(', '):'—';
  const borders=c.borders?.map(b=>{const bc=allCountries.find(x=>x.cca3===b);return bc?'<button class="border-chip" data-code="'+b+'">'+(bc.flags?.emoji||'')+' '+(bc.name?.common||b)+'</button>':'<button class="border-chip" data-code="'+b+'">'+b+'</button>'}).join('')||t('none');
  detailCard.style.display='';
  detailCard.innerHTML='<div class="card"><div class="flag">'+(c.flags?.emoji||'')+'</div><div class="info"><h2>'+(c.name?.common||'')+'</h2><div class="native">'+(c.name?.official||'')+'</div><div class="grid"><div class="item"><div class="i-label">'+t('capital')+'</div><div class="i-val">'+(c.capital?.[0]||'—')+'</div></div><div class="item"><div class="i-label">'+t('population')+'</div><div class="i-val">'+num(c.population||0)+'</div></div><div class="item"><div class="i-label">'+t('region')+'</div><div class="i-val">'+(c.region||'—')+'</div></div><div class="item"><div class="i-label">'+t('subregion')+'</div><div class="i-val">'+(c.subregion||'—')+'</div></div><div class="item"><div class="i-label">'+t('languages')+'</div><div class="i-val">'+langs+'</div></div><div class="item"><div class="i-label">'+t('currencies')+'</div><div class="i-val">'+currs+'</div></div></div><div class="borders"><h3>'+t('borders')+'</h3><div class="border-chips">'+borders+'</div></div><div class="map-link"><a href="'+(c.maps?.googleMaps||'#')+'" target="_blank">'+t('openMaps')+' ↗</a> · <a href="'+(c.maps?.openStreetMaps||'#')+'" target="_blank">'+t('openOSM')+' ↗</a></div></div></div>';
  detailCard.querySelectorAll('[data-code]').forEach(b=>b.addEventListener('click',()=>showDetail(b.dataset.code)));
  detailCard.scrollIntoView({behavior:'smooth'})
}

searchInput.addEventListener('input',filter);searchBtn.addEventListener('click',filter);searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')filter()});
applyLang();loadAll();
</script></body></html>
