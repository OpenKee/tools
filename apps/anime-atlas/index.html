<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Atlas — Anime Explorer</title>
    <meta name="description" content="Explore anime from Jikan / MyAnimeList." />
    <meta name="theme-color" content="#db2777" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar anime-topbar">
      <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
      <div class="topbar-right">
        <button id="langBtn" class="ok-lang-toggle" type="button">中文</button>
      </div>
    </nav>

    <main class="shell">
      <header class="masthead">
        <p class="eyebrow" data-ok-i18n="eyebrow">Jikan · Anime Explorer</p>
        <h1 data-ok-i18n="title">Anime Atlas</h1>
        <p class="lead" data-ok-i18n="lead">Search anime by title or browse top-ranked titles from MyAnimeList.</p>
      </header>

      <section class="controls">
        <form id="searchForm" class="search-row">
          <input id="searchInput" type="text" placeholder="Search anime…" autocomplete="off" />
          <button type="submit" data-ok-i18n="search">Search</button>
        </form>
        <div class="filter-row">
          <button id="topBtn" type="button" class="ok-btn-ghost" data-ok-i18n="topRated">Top Rated</button>
          <button id="airingBtn" type="button" class="ok-btn-ghost" data-ok-i18n="airing">Airing Now</button>
          <span id="statusInfo" class="status-info"></span>
        </div>
      </section>

      <div id="loadingRow" class="ok-loading" style="display:none;">
        <span class="ok-spinner"></span>
        <span data-ok-i18n="loading">Loading…</span>
      </div>

      <div id="animeGrid" class="anime-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none;" data-ok-i18n="empty">No anime found.</div>
      <div id="errorState" class="ok-error" style="display:none;" data-ok-i18n="fetchError">Failed to load anime.</div>
    </main>

    <div id="detailModal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <footer class="ok-footer">
      <span data-ok-i18n="dataSource">Data: Jikan / MyAnimeList</span>
      <span><a href="https://openkee.github.io/" data-ok-i18n="allProjects">All projects ↗</a></span>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
