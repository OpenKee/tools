<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Finder — Open Library Search</title>
    <meta name="description" content="Search millions of books from the Open Library catalog by title, author, or ISBN." />
    <meta name="theme-color" content="#faf7f2" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar"><a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a></nav>

    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow" data-ok-i18n="eyebrow">Book discovery</p>
          <h1 data-ok-i18n="title">Book Finder</h1>
          <p class="lead" data-ok-i18n="lead">Search millions of titles from the Open Library catalog.</p>
        </div>
        <button id="langToggle" class="ok-lang-toggle" type="button">中文</button>
      </header>

      <!-- 搜索区 -->
      <section class="search" aria-label="Search books">
        <div class="search-row">
          <input id="searchInput" type="search" class="search-input" aria-label="Search books" autocomplete="off" />
          <button id="searchBtn" class="search-btn" type="button" data-ok-i18n="search">Search</button>
        </div>
        <p id="resultCount" class="result-count" aria-live="polite"></p>
      </section>

      <!-- 热门搜索建议 -->
      <section id="suggestions" class="suggestions" aria-label="Popular searches">
        <p class="suggestions-title" data-ok-i18n="suggestionsTitle">Popular searches</p>
        <div id="suggestionChips" class="chips"></div>
      </section>

      <!-- 加载状态 -->
      <div id="loading" class="state loading" style="display:none;">
        <div class="spinner" aria-hidden="true"></div>
        <span data-ok-i18n="loading">Searching the shelves…</span>
      </div>

      <!-- 错误状态 -->
      <div id="errorBox" class="state error" style="display:none;">
        <p id="errorMsg"></p>
        <button id="retryBtn" class="btn-ghost" type="button" data-ok-i18n="tryAgain">Try again</button>
      </div>

      <!-- 结果网格 -->
      <section id="results" class="grid" aria-label="Search results"></section>

      <!-- 空结果 -->
      <div id="empty" class="state empty" style="display:none;">
        <div class="empty-icon" aria-hidden="true"></div>
        <p data-ok-i18n="noResults">No books found. Try another keyword.</p>
      </div>

      <!-- 加载更多 -->
      <div id="loadMoreWrap" class="load-more" style="display:none;">
        <button id="loadMoreBtn" class="btn-ghost" type="button" data-ok-i18n="loadMore">Load more</button>
        <p id="endText" class="end-text" style="display:none;" data-ok-i18n="endOfResults">End of results</p>
      </div>
    </main>

    <!-- 详情抽屉（侧边滑出面板） -->
    <aside id="drawer" class="drawer" aria-hidden="true" aria-label="Book details">
      <div class="drawer-backdrop" data-close></div>
      <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
        <button class="drawer-close" data-close type="button" aria-label="Close details">×</button>
        <div id="detailBody" class="drawer-body"></div>
      </div>
    </aside>

    <footer class="ok-footer">
      Built by <a href="https://github.com/OpenKee" target="_blank" rel="noreferrer">OpenKee</a> &middot; <a href="https://openkee.github.io/" target="_blank" rel="noreferrer">All projects</a>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
