<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Forge — Random Memes</title>
    <meta name="description" content="Random memes from Reddit via Meme API." />
    <meta name="theme-color" content="#f97316" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😂</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="ok-topbar meme-topbar">
      <a href="../../index.html" class="ok-topbar-link">← OpenKee Tools</a>
      <div class="topbar-right">
        <button id="langBtn" class="ok-lang-toggle" type="button">中文</button>
      </div>
    </nav>

    <main class="shell">
      <header class="masthead">
        <p class="eyebrow" data-ok-i18n="eyebrow">Meme API · Random Memes</p>
        <h1 data-ok-i18n="title">Meme Forge</h1>
        <p class="lead" data-ok-i18n="lead">Get a random meme, pick a subreddit, or browse through the latest posts.</p>
      </header>

      <section class="controls">
        <form id="subForm" class="sub-row">
          <span class="sub-label">r/</span>
          <input id="subInput" type="text" placeholder="memes" autocomplete="off" aria-label="Subreddit name" />
          <button type="submit" data-ok-i18n="load">Load</button>
          <button id="randomBtn" type="button" class="ok-btn-ghost" data-ok-i18n="random">Random</button>
        </form>
        <div class="action-row">
          <button id="prevBtn" type="button" class="ok-btn-ghost" data-ok-i18n="prev">← Prev</button>
          <button id="nextBtn" type="button" class="ok-btn-ghost" data-ok-i18n="next">Next →</button>
          <button id="copyBtn" type="button" class="ok-btn-ghost copy-btn" data-ok-i18n="copyLink">Copy Link</button>
        </div>
      </section>

      <div id="loadingRow" class="ok-loading" style="display:none;">
        <span class="ok-spinner"></span>
        <span data-ok-i18n="loading">Loading…</span>
      </div>

      <div id="memeCard" class="meme-card" style="display:none;">
        <img id="memeImage" src="" alt="" />
        <div class="meme-body">
          <h2 id="memeTitle" class="meme-title"></h2>
          <div class="meme-meta">
            <span id="memeSubreddit"></span>
            <span id="memeVotes"></span>
            <span id="memeAuthor"></span>
          </div>
          <a id="memeLink" class="meme-link" href="#" target="_blank" rel="noopener" data-ok-i18n="viewPost">View post ↗</a>
        </div>
      </div>

      <div id="errorState" class="ok-error" style="display:none;" data-ok-i18n="fetchError">Failed to load meme.</div>
    </main>

    <footer class="ok-footer">
      <span data-ok-i18n="dataSource">Data: Meme API / Reddit</span>
      <span><a href="https://openkee.github.io/" data-ok-i18n="allProjects">All projects ↗</a></span>
    </footer>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
  </body>
</html>
