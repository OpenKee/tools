<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SEO 体检 — 网站健康诊断</title>
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f172a;--sf:#1e293b;--sf2:#162032;--bd:#334155;--bd2:#475569;--tx:#e2e8f0;--mt:#94a3b8;--dm:#64748b;--gn:#22c55e;--yl:#eab308;--rd:#ef4444;--bl:#3b82f6;--cy:#06b6d4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"JetBrains Mono","Noto Sans SC",monospace;color:var(--tx);background:var(--bg);line-height:1.6}
.wrap{max-width:780px;margin:0 auto;padding:0 1.25rem}

/* TOP BAR */
.top{padding:1rem 0;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--bd)}
.top .ping{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.top .path{font-size:.78rem;color:var(--dm)}
.top .path span{color:var(--cy)}

/* INPUT */
.input-area{padding:2.5rem 0 1.5rem;text-align:center}
.input-area h1{font-size:1.4rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.3rem}
.input-area .sub{color:var(--dm);font-size:.78rem;margin-bottom:1.5rem}
.bar{display:flex;gap:0;max-width:520px;margin:0 auto;border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:var(--sf)}
.bar .prompt{padding:0 .75rem;display:flex;align-items:center;color:var(--gn);font-size:.85rem;flex-shrink:0}
.bar input{flex:1;height:2.8rem;background:none;border:none;outline:none;color:var(--tx);font:inherit;font-size:.82rem}
.bar input::placeholder{color:var(--dm)}
.bar button{height:2.8rem;padding:0 1.2rem;background:var(--bl);color:#fff;border:none;font:inherit;font-weight:600;font-size:.75rem;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.bar button:disabled{opacity:.4}
.examples{margin-top:.6rem;font-size:.72rem;color:var(--dm)}
.examples button{background:none;border:none;color:var(--bl);font:inherit;font-size:.72rem;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

.ld{display:none;padding:2rem 0;text-align:center;font-size:.82rem;color:var(--dm)}
.ld.on{display:block}
.ld .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--cy);border-radius:50%;animation:sp .7s linear infinite;margin-right:.5rem;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.err{display:none;padding:.75rem 1rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;margin:1rem 0;font-size:.82rem;color:var(--rd)}
.err.on{display:block}

/* REPORT */
.report{display:none}
.report.on{display:block}

/* HEADER */
.rpt-head{padding:1.5rem 0;border-bottom:1px solid var(--bd);margin-bottom:1rem;display:flex;align-items:center;gap:1.25rem}
.ring{position:relative;width:80px;height:80px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:var(--bd)}
.ring .fg{stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700}
.rpt-info{flex:1}
.rpt-info .domain{font-size:1rem;font-weight:600;word-break:break-all}
.rpt-info .meta{font-size:.72rem;color:var(--dm);margin-top:.2rem}
.rpt-info .tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.rpt-info .tg{font-size:.68rem;padding:.15rem .5rem;border-radius:3px;font-weight:500}
.tg.g{color:var(--gn);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25)}
.tg.w{color:var(--yl);background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.25)}
.tg.b{color:var(--rd);background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25)}

/* SECTION */
.sec{margin-bottom:1.25rem}
.sec-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.sec-head .icon{font-size:.75rem}
.sec-head .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dm);font-weight:600}
.sec-head .line{flex:1;height:1px;background:var(--bd)}

/* ROW */
.row{display:grid;grid-template-columns:1.5rem 1fr auto;gap:.6rem;align-items:start;padding:.5rem .75rem;border-radius:4px;transition:background .15s}
.row:hover{background:var(--sf2)}
.row+.row{margin-top:1px}
.row .icon{font-size:.82rem;text-align:center;line-height:1.6}
.row .icon.p{color:var(--gn)}.row .icon.w{color:var(--yl)}.row .icon.f{color:var(--rd)}
.row .body{min-width:0}
.row .name{font-size:.78rem;font-weight:500}
.row .val{font-size:.72rem;color:var(--mt);margin-top:.1rem;word-break:break-all}
.row .tip{font-size:.68rem;color:var(--dm);margin-top:.15rem;font-style:italic;padding-left:.75rem;border-left:2px solid var(--bd)}
.row .badge{font-size:.65rem;padding:.1rem .4rem;border-radius:3px;align-self:center;flex-shrink:0}
.badge.p{color:var(--gn);background:rgba(34,197,94,.1)}.badge.w{color:var(--yl);background:rgba(234,179,8,.1)}.badge.f{color:var(--rd);background:rgba(239,68,68,.1)}

footer{padding:2rem 0;border-top:1px solid var(--bd);margin-top:2rem;font-size:.68rem;color:var(--dm);text-align:center}

@media(max-width:500px){
  .rpt-head{flex-direction:column;text-align:center}
  .row{grid-template-columns:1.5rem 1fr;gap:.4rem}
  .row .badge{display:none}
}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><span class="ping"></span><span class="path"><span>openkee</span> / seo-scan</span></div>

<div class="input-area">
<h1>SEO SCAN</h1>
<div class="sub">// 输入域名，生成诊断报告</div>
<div class="bar">
<span class="prompt">&gt;</span>
<input type="text" id="inp" placeholder="example.com" autocomplete="off"/>
<button id="btn" onclick="go()">SCAN</button>
</div>
<div class="examples">
<button onclick="q('openkee.github.io')">openkee.github.io</button> ·
<button onclick="q('github.com')">github.com</button> ·
<button onclick="q('docs.openclaw.ai')">docs.openclaw.ai</button>
</div>
</div>

<div class="ld" id="ld"><span class="spin"></span>扫描中…</div>
<div class="err" id="er"></div>
<div class="report" id="rpt"></div>
<footer>seo-scan v1.0 · 纯前端 · 无需后端</footer>
</div>

<script>
var $=function(id){return document.getElementById(id)};
function q(v){$('inp').value=v;go()}

var P=[
  function(u){return'https://corsproxy.io/?'+encodeURIComponent(u)},
  function(u){return'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)},
  function(u){return'https://api.allorigins.win/raw?url='+encodeURIComponent(u)}
];
function pf(url,ms){ms=ms||12000;var i=0;function n(){if(i>=P.length)return Promise.reject('proxy');var m=P[i++];return fetch(m(url),{signal:AbortSignal.timeout(ms)}).then(function(r){return r.ok?r.text():n()}).catch(n)}return n()}
function norm(s){s=s.trim();if(!/^https?:\/\//i.test(s))s='https://'+s;try{return new URL(s)}catch(e){return null}}
function g(h,r){return h.match(r)}
function gs(h,r){return h.match(new RegExp(r.source+'g',r.flags))||[]}
function e(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function go(){
  var raw=$('inp').value.trim();if(!raw)return;
  var u=norm(raw);
  if(!u){$('er').textContent='URL 格式错误';$('er').classList.add('on');return}
  $('btn').disabled=true;$('rpt').innerHTML='';$('rpt').classList.remove('on');
  $('er').classList.remove('on');$('ld').classList.add('on');
  scan(u).then(function(r){draw(r,u)}).catch(function(x){$('er').textContent=x.message||x;$('er').classList.add('on')})
  .finally(function(){$('btn').disabled=false;$('ld').classList.remove('on')});
}

function scan(u){
  var o=u.origin,R=[];
  var t0=Date.now();
  return pf(u.href).then(function(h){
    var ms=Date.now()-t0;
    if(!h)throw new Error('无法访问');

    R.push({g:'基础',n:'HTTPS',s:u.protocol==='https:'?'p':'f',v:u.protocol,t:u.protocol!=='https:'?'建议启用 HTTPS':''});
    R.push({g:'基础',n:'响应',s:ms<800?'p':ms<2500?'w':'f',v:ms+'ms',t:ms>2500?'响应慢':''});
    var fav=/<link[^>]*rel=["'](?:shortcut )?icon["']/i.test(h);
    R.push({g:'基础',n:'Favicon',s:fav?'p':'w',v:fav?'✓':'—',t:!fav?'建议添加':''});

    var tM=g(h,/<title[^>]*>([^<]*)<\/title>/i);
    var t=tM?tM[1].trim():'';var tL=[].slice.call(t).length;
    R.push({g:'Meta',n:'Title',s:!t?'f':tL>60?'w':'p',v:t?t+' ('+tL+')':'缺失',t:!t?'必须设置':tL>60?'过长':''});

    var dM=g(h,/<meta[^>]*name=["']description["'][^>]*content=["']([^"']*)["']/i)||g(h,/<meta[^>]*content=["']([^"']*)["'][^>]*name=["']description["']/i);
    var d=dM?dM[1].trim():'';var dL=[].slice.call(d).length;
    R.push({g:'Meta',n:'Description',s:!d?'f':dL>160?'w':'p',v:d?d.slice(0,60)+'... ('+dL+')':'缺失',t:!d?'必须设置':dL>160?'过长':''});

    var ca=g(h,/<link[^>]*rel=["']canonical["'][^>]*href=["']([^"']*)["']/i);
    R.push({g:'Meta',n:'Canonical',s:ca?'p':'w',v:ca?ca[1]:'—',t:!ca?'建议设置':''});

    var vp=g(h,/<meta[^>]*name=["']viewport["']/i);
    R.push({g:'Meta',n:'Viewport',s:vp?'p':'f',v:vp?'✓':'—',t:!vp?'移动端必备':''});

    var ogT=g(h,/<meta[^>]*property=["']og:title["']/i);
    var ogD=g(h,/<meta[^>]*property=["']og:description["']/i);
    var ogI=g(h,/<meta[^>]*property=["']og:image["']/i);
    var ogU=g(h,/<meta[^>]*property=["']og:url["']/i);
    var tw=g(h,/<meta[^>]*name=["']twitter:card["']/i);
    var ogN=[ogT,ogD,ogI,ogU].filter(Boolean).length;
    R.push({g:'社交',n:'Open Graph',s:ogN>=3?'p':ogN>=1?'w':'f',v:ogN+'/4',t:ogN<3?'不完整':''});
    R.push({g:'社交',n:'Twitter Card',s:tw?'p':'w',v:tw?'✓':'—',t:!tw?'建议添加':''});

    var h1=gs(h,/<h1[^>]*>[\s\S]*?<\/h1>/i);
    R.push({g:'结构',n:'H1',s:h1.length===1?'p':h1.length===0?'f':'w',v:h1.length+' 个',t:h1.length!==1?'应有且仅有 1 个':''});
    var hc=0;['h2','h3','h4','h5','h6'].forEach(function(x){hc+=gs(h,new RegExp('<'+x+'[^>]*>','gi')).length});
    R.push({g:'结构',n:'H2-H6',s:hc>0?'p':'w',v:hc+' 个',t:hc===0?'建议分层':''});

    var im=gs(h,/<img[^>]*>/gi);
    var na=im.filter(function(i){return!/alt=["'][^"']+["']/i.test(i)});
    R.push({g:'结构',n:'Img Alt',s:im.length===0?'p':na.length===0?'p':na.length<3?'w':'f',
      v:im.length+'/'+im.length+' (缺 '+na.length+')',t:na.length>0?na.length+' 张缺 alt':''});

    var jld=gs(h,/<script[^>]*type=["']application\/ld\+json["']/i);
    R.push({g:'技术',n:'JSON-LD',s:jld.length>0?'p':'w',v:jld.length+' 个',t:jld.length===0?'建议添加':''});

    var rb=g(h,/<meta[^>]*name=["']robots["'][^>]*content=["']([^"']*)["']/i);
    var rbV=rb?rb[1].toLowerCase():'';
    R.push({g:'技术',n:'Robots',s:rbV.indexOf('noindex')>=0?'f':rb?'p':'w',v:rb?rb[1]:'默认',t:rbV.indexOf('noindex')>=0?'noindex!':''});

    return pf(o+'/robots.txt').catch(function(){return null}).then(function(rt){
      R.push({g:'技术',n:'robots.txt',s:rt?'p':'w',v:rt?rt.split('\n').length+' 行':'—',t:!rt?'建议创建':''});
      return pf(o+'/sitemap.xml').catch(function(){return null}).then(function(sm){
        var ok=sm&&(sm.indexOf('<urlset')>=0||sm.indexOf('<sitemapindex')>=0);
        R.push({g:'技术',n:'sitemap.xml',s:ok?'p':'w',v:ok?'✓':'—',t:!ok?'建议创建':''});
        return R;
      });
    });
  });
}

function draw(R,u){
  var pass=R.filter(function(r){return r.s==='p'}).length;
  var total=R.length;
  var score=Math.round(pass/total*100);
  var col=score>=80?'var(--gn)':score>=50?'var(--yl)':'var(--rd)';
  var circ=2*Math.PI*34;
  var off=circ-(score/100)*circ;

  var tags=[];
  if(score>=80)tags.push('<span class="tg g">HEALTHY</span>');
  else if(score>=50)tags.push('<span class="tg w">NEEDS WORK</span>');
  else tags.push('<span class="tg b">CRITICAL</span>');
  tags.push('<span class="tg w">'+pass+'/'+total+' PASSED</span>');

  var h='<div class="rpt-head">';
  h+='<div class="ring"><svg width="80" height="80" viewBox="0 0 80 80">';
  h+='<circle class="bg" cx="40" cy="40" r="34" fill="none" stroke-width="5"/>';
  h+='<circle class="fg" cx="40" cy="40" r="34" fill="none" stroke-width="5" stroke="'+col+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'"/>';
  h+='</svg><div class="val" style="color:'+col+'">'+score+'</div></div>';
  h+='<div class="rpt-info"><div class="domain">'+u.hostname+'</div>';
  h+='<div class="meta">'+new Date().toLocaleString('zh-CN')+' · '+R.length+' checks</div>';
  h+='<div class="tags">'+tags.join('')+'</div></div></div>';

  var cats={};
  R.forEach(function(r){if(!cats[r.g])cats[r.g]=[];cats[r.g].push(r)});

  Object.keys(cats).forEach(function(g){
    h+='<div class="sec"><div class="sec-head"><span class="icon">//</span><span class="label">'+g+'</span><span class="line"></span></div>';
    cats[g].forEach(function(r){
      var ic=r.s==='p'?'✓':r.s==='w'?'⚠':'✗';
      var bg=r.s==='p'?'PASS':r.s==='w'?'WARN':'FAIL';
      h+='<div class="row"><div class="icon '+r.s+'">'+ic+'</div><div class="body"><div class="name">'+r.n+'</div>';
      if(r.v)h+='<div class="val">'+e(r.v)+'</div>';
      if(r.t)h+='<div class="tip">'+e(r.t)+'</div>';
      h+='</div><span class="badge '+r.s+'">'+bg+'</span></div>';
    });
    h+='</div>';
  });

  $('rpt').innerHTML=h;$('rpt').classList.add('on');
}
</script>
</body>
</html>
