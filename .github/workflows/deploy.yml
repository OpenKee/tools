name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 GITHUB_TOKEN 有部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 生产构建，base 路径 /tools/ 在 vite.config.js 中按 mode=production 自动生效
      - run: npm run build

      # GitHub Pages 不支持服务器端路由重写。
      # 复制 index.html 为 404.html，实现 SPA fallback：
      # 访问任意未匹配路径时 GH Pages 返回 404.html，Vue Router 接管路由。
      - run: cp dist/index.html dist/404.html

      # 未迁移的 25 个旧应用仍需可访问：复制 apps/ 到 dist/。
      # 排除已迁移到 Vue 的 3 个目录（它们走 SPA 路由，旧 HTML 不再需要）。
      # 同时复制 shared.js / shared.css（旧应用通过 ../../shared.js 引用）。
      - run: |
          cp -r apps dist/apps
          rm -rf dist/apps/qr-forge dist/apps/sun-moon dist/apps/crypto-pulse
          cp shared.js shared.css dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
